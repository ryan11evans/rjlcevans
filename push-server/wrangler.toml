name = "tapbtc-push"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Run the price check once a minute.
[triggers]
crons = ["* * * * *"]

# Stores device tokens, their alerts, and the cached APNs JWT.
# Replace the id below with the one printed by:
#   npx wrangler kv namespace create ALERTS
[[kv_namespaces]]
binding = "ALERTS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Non-secret config. The three APNS_* secrets are set via `wrangler secret put`
# (see README) and must NOT be committed here.
[vars]
APNS_BUNDLE_ID = "com.rjlcevans.rjlbtcwatch"
