<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgDark" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </radialGradient>
    <radialGradient id="lensLD" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a3f54"/>
      <stop offset="100%" stop-color="#1a2d3f"/>
    </radialGradient>
    <radialGradient id="lensRD" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a3f54"/>
      <stop offset="100%" stop-color="#1a2d3f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgDark)"/>

  <!-- Hair -->
  <rect x="28" y="10" width="44" height="22" rx="4" fill="#3d2008"/>
  <ellipse cx="50" cy="28" rx="22" ry="10" fill="#3d2008"/>

  <!-- Face -->
  <ellipse cx="50" cy="46" rx="22" ry="23" fill="#d4a070"/>

  <!-- Shirt -->
  <rect x="28" y="76" width="44" height="28" rx="8" fill="#e8e8e8"/>

  <!-- Tie -->
  <rect x="44" y="76" width="12" height="6" rx="1" fill="#3a6ab0"/>
  <rect x="44" y="82" width="12" height="2" rx="0" fill="#e8e8e8"/>
  <rect x="44" y="84" width="12" height="6" rx="1" fill="#b03020"/>
  <rect x="44" y="90" width="12" height="2" rx="0" fill="#e8e8e8"/>
  <rect x="45" y="92" width="10" height="10" rx="1" fill="#b03020"/>

  <!-- Glasses glow -->
  <circle cx="37" cy="46" r="14" fill="none" stroke="#5ab0e0" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <circle cx="63" cy="46" r="14" fill="none" stroke="#5ab0e0" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- Glasses frames -->
  <circle cx="37" cy="46" r="15" fill="none" stroke="#a07848" stroke-width="3.5"/>
  <circle cx="63" cy="46" r="15" fill="none" stroke="#a07848" stroke-width="3.5"/>
  <!-- Lenses -->
  <circle cx="37" cy="46" r="13.5" fill="url(#lensLD)"/>
  <circle cx="63" cy="46" r="13.5" fill="url(#lensRD)"/>
  <!-- Frame overlay -->
  <circle cx="37" cy="46" r="13.5" fill="none" stroke="#a07848" stroke-width="3"/>
  <circle cx="63" cy="46" r="13.5" fill="none" stroke="#a07848" stroke-width="3"/>
  <!-- Bridge -->
  <path d="M51 46 Q54 43 49 46" stroke="#a07848" stroke-width="2.5" fill="none"/>
  <!-- Temples -->
  <line x1="22" y1="44" x2="24" y2="46" stroke="#a07848" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="44" x2="76" y2="46" stroke="#a07848" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pupils (bright against dark lenses) -->
  <circle cx="37" cy="46" r="5.5" fill="#ddeeff"/>
  <circle cx="63" cy="46" r="5.5" fill="#ddeeff"/>
  <circle cx="37" cy="46" r="3.5" fill="#111"/>
  <circle cx="63" cy="46" r="3.5" fill="#111"/>
  <circle cx="35" cy="44" r="1.5" fill="white"/>
  <circle cx="61" cy="44" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M42 60 Q50 67 58 60" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
