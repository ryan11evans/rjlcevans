name: BitcoinWatch
options:
  bundleIdPrefix: com.rjlcevans
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Fill in your Apple Developer Team ID

targets:

  # ── iPhone App ──────────────────────────────────────────────────────────────
  BitcoinWatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BitcoinWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjlcevans.bitcoinwatch
        INFOPLIST_FILE: BitcoinWatch/App/Info.plist
    entitlements:
      path: BitcoinWatch/BitcoinWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjlcevans.bitcoinwatch
    dependencies:
      - target: BitcoinWatchWidget
      - target: BitcoinWatchWatchApp

  # ── Widget Extension ─────────────────────────────────────────────────────────
  BitcoinWatchWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BitcoinWatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjlcevans.bitcoinwatch.widget
        INFOPLIST_FILE: BitcoinWatchWidget/Info.plist
    entitlements:
      path: BitcoinWatchWidget/BitcoinWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjlcevans.bitcoinwatch

  # ── Watch App ─────────────────────────────────────────────────────────────────
  BitcoinWatchWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: WatchApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rjlcevans.bitcoinwatch.watchkitapp
        INFOPLIST_FILE: WatchApp/App/Info.plist
    entitlements:
      path: WatchApp/WatchApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rjlcevans.bitcoinwatch
