<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#F7931A" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#F7931A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="btnGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F7931A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle glow behind symbol -->
  <ellipse cx="512" cy="472" rx="360" ry="340" fill="url(#glow)"/>

  <!--
    Bitcoin ₿ symbol drawn as paths at 1024×1024.
    Vertical stem + two bumps + two pairs of horizontal strokes.
    Stroke weight ~68px, matches a bold sans-serif B at this scale.
  -->

  <!-- Vertical stem -->
  <rect x="388" y="196" width="72" height="632" rx="12" fill="#F7931A"/>

  <!-- Upper B bump -->
  <path d="M 456 196
             L 614 196
             Q 730 196 730 332
             Q 730 468 614 468
             L 456 468 Z"
        fill="none" stroke="#F7931A" stroke-width="72" stroke-linejoin="round"
        paint-order="stroke"/>
  <path d="M 460 232 L 614 232 Q 694 232 694 332 Q 694 432 614 432 L 460 432"
        fill="#1C1C1E" stroke="none"/>
  <!-- Redrawn as filled shapes for precision -->

  <!-- Upper bump filled -->
  <path d="M 424 200 L 614 200
             Q 762 200 762 336
             Q 762 472 614 472
             L 424 472 L 424 404 L 614 404
             Q 690 404 690 336
             Q 690 268 614 268 L 424 268 Z"
        fill="#F7931A"/>

  <!-- Lower bump filled (slightly larger) -->
  <path d="M 424 472 L 628 472
             Q 790 472 790 620
             Q 790 756 628 756
             L 424 756 L 424 688 L 628 688
             Q 718 688 718 620
             Q 718 540 628 540 L 424 540 Z"
        fill="#F7931A"/>

  <!-- Top serifs (two horizontal bars crossing the stem above the B) -->
  <rect x="356" y="178" width="196" height="44" rx="22" fill="#F7931A"/>
  <rect x="356" y="244" width="196" height="44" rx="22" fill="#F7931A"/>

  <!-- Bottom serifs (two horizontal bars crossing the stem below the B) -->
  <rect x="356" y="736" width="196" height="44" rx="22" fill="#F7931A"/>
  <rect x="356" y="802" width="196" height="44" rx="22" fill="#F7931A"/>

  <!-- Subtle inner highlight on upper bump -->
  <path d="M 454 268 L 614 268 Q 682 268 682 336 Q 682 380 654 402"
        fill="none" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.07"
        stroke-linecap="round"/>
</svg>
