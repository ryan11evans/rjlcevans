<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
    <stop offset="0%" stop-color="#1C1C1E"/>
    <stop offset="100%" stop-color="#050505"/>
  </linearGradient>
  <radialGradient id="cg" cx="50%" cy="50%" r="38%">
    <stop offset="0%" stop-color="#F7931A" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#F7931A" stop-opacity="0"/>
  </radialGradient>
  <!-- Wide blur for outer glow on orbit ring -->
  <filter id="gb" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="22"/>
  </filter>
  <!-- Tighter blur for inner glow -->
  <filter id="gm" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="9"/>
  </filter>
</defs>

<!-- Background -->
<rect width="1024" height="1024" fill="url(#bg)"/>
<ellipse cx="512" cy="512" rx="400" ry="400" fill="url(#cg)"/>

<!--
  Two clockwise arc arrows orbiting the ₿, radius 420.
  Arc 1: 20° → 160° (right side, through 3 o'clock)
    Sharp path ends at 151.8° so arrowhead at 160° has room.
  Arc 2: 200° → 340° (left side, through 9 o'clock)
    Sharp path ends at 331.8° so arrowhead at 340° has room.

  Angles measured clockwise from 12 o'clock.
  All coords: x = 512 + 420·sin(α), y = 512 − 420·cos(α)
  20°  → (656, 117)     160° → (656, 907)   tip of arrow 1
  200° → (368, 907)     340° → (368, 117)   tip of arrow 2
  151.8° → (710, 883)   arc 1 stroke end
  331.8° → (314, 141)   arc 2 stroke end

  Arrowhead 1 polygon (tip + two wings):  656,907  721,912  699,852
  Arrowhead 2 polygon:                    368,117  303,112  325,172
-->

<!-- Outer glow layer (wide + blurry) -->
<g filter="url(#gb)" opacity="0.55">
  <path d="M 656 117 A 420 420 0 0 1 656 907" stroke="#F7931A" stroke-width="110" fill="none"/>
  <path d="M 368 907 A 420 420 0 0 1 368 117" stroke="#F7931A" stroke-width="110" fill="none"/>
  <polygon points="656,907 721,912 699,852" fill="#F7931A"/>
  <polygon points="368,117 303,112 325,172" fill="#F7931A"/>
</g>

<!-- Inner glow layer -->
<g filter="url(#gm)" opacity="0.55">
  <path d="M 656 117 A 420 420 0 0 1 710 883" stroke="#F7931A" stroke-width="72" fill="none" stroke-linecap="round"/>
  <path d="M 368 907 A 420 420 0 0 1 314 141" stroke="#F7931A" stroke-width="72" fill="none" stroke-linecap="round"/>
  <polygon points="656,907 721,912 699,852" fill="#F7931A"/>
  <polygon points="368,117 303,112 325,172" fill="#F7931A"/>
</g>

<!-- ₿ symbol — scaled 85%, bounding box center (573,512) mapped to canvas center (512,512) -->
<g transform="translate(512,512) scale(0.85) translate(-573,-512)">
  <!-- vertical stem -->
  <rect x="388" y="196" width="72" height="632" rx="12" fill="#F7931A"/>
  <!-- upper bump (outer shell minus inner cutout) -->
  <path d="M 424 200 L 614 200 Q 762 200 762 336 Q 762 472 614 472
           L 424 472 L 424 404 L 614 404 Q 690 404 690 336
           Q 690 268 614 268 L 424 268 Z" fill="#F7931A"/>
  <!-- lower bump (slightly larger) -->
  <path d="M 424 472 L 628 472 Q 790 472 790 620 Q 790 756 628 756
           L 424 756 L 424 688 L 628 688 Q 718 688 718 620
           Q 718 540 628 540 L 424 540 Z" fill="#F7931A"/>
  <!-- top serifs (two horizontal strokes crossing the stem) -->
  <rect x="356" y="178" width="196" height="44" rx="22" fill="#F7931A"/>
  <rect x="356" y="244" width="196" height="44" rx="22" fill="#F7931A"/>
  <!-- bottom serifs -->
  <rect x="356" y="736" width="196" height="44" rx="22" fill="#F7931A"/>
  <rect x="356" y="802" width="196" height="44" rx="22" fill="#F7931A"/>
</g>

<!-- Sharp orbit arcs (on top of ₿ so they read clearly) -->
<path d="M 656 117 A 420 420 0 0 1 710 883"
      stroke="#F7931A" stroke-width="52" fill="none" stroke-linecap="round"/>
<path d="M 368 907 A 420 420 0 0 1 314 141"
      stroke="#F7931A" stroke-width="52" fill="none" stroke-linecap="round"/>

<!-- Arrowheads -->
<polygon points="656,907 721,912 699,852" fill="#F7931A"/>
<polygon points="368,117 303,112 325,172" fill="#F7931A"/>

<!-- Bright hot-spot at each arrowhead tip (the "fast" point) -->
<circle cx="656" cy="907" r="18" fill="#FFDF80" opacity="0.85"/>
<circle cx="368" cy="117" r="18" fill="#FFDF80" opacity="0.85"/>
</svg>
