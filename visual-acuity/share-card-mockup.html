<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Card Mockup v2</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; font-family: sans-serif; padding: 24px; }
  .card-wrap { width: min(90vw, 420px); aspect-ratio: 1; position: relative; }
  canvas#card { width: 100%; height: 100%; display: block; border-radius: 16px; }
  p { color: #888; font-size: 13px; text-align: center; }
  button { padding: 12px 28px; background: #D4A017; color: #111; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="card-wrap">
  <canvas id="card" width="1080" height="1080"></canvas>
</div>
<button onclick="download()">Download 1080×1080 PNG</button>
<p>Proposed v2 — score shifted up, OD/OS larger, labels more readable</p>

<script>
const canvas = document.getElementById('card');
const ctx = canvas.getContext('2d');
const S = 1080;

// Sample data — edit to preview different results
const bestSnellen = '20/200';
const odSnellen   = '20/100';
const osSnellen   = '20/200';

function draw() {
  // ── Background ─────────────────────────────────────────────────────────────
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, S, S);

  const bgGlow = ctx.createRadialGradient(S/2, S*0.1, 0, S/2, S*0.25, S*0.65);
  bgGlow.addColorStop(0, 'rgba(212,160,23,0.18)');
  bgGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgGlow;
  ctx.fillRect(0, 0, S, S);

  // ── Cascading chart watermark ───────────────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.20;
  ctx.fillStyle = '#D4A017';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const rows = [
    { text: 'E',             size: 110, y: 28  },
    { text: 'F P',           size: 74,  y: 150 },
    { text: 'T O Z',         size: 50,  y: 238 },
    { text: 'L P E D',       size: 34,  y: 302 },
    { text: 'P E C F D',     size: 24,  y: 348 },
  ];
  rows.forEach(r => {
    ctx.font = `700 ${r.size}px Georgia, serif`;
    ctx.fillText(r.text, S/2, r.y);
  });
  ctx.restore();

  // ── Eyebrow ────────────────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(212,160,23,0.62)';
  ctx.font = `500 26px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('EYE CHART TEST  ·  DR. EVANS, OD', S/2, 448);

  // ── Big score — moved up 35px ─────────────────────────────────────────────
  ctx.save();
  ctx.filter = 'blur(28px)';
  ctx.fillStyle = 'rgba(212,160,23,0.55)';
  ctx.font = `bold 210px 'Fraunces', Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(bestSnellen, S/2, 625);
  ctx.restore();

  ctx.fillStyle = '#D4A017';
  ctx.font = `bold 210px 'Fraunces', Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(bestSnellen, S/2, 625);

  // Sub-label — bigger (26px, was 20px) ─────────────────────────────────────
  ctx.fillStyle = 'rgba(242,242,247,0.42)';
  ctx.font = `500 26px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('VISUAL ACUITY  ·  BEST EYE', S/2, 672);

  // ── Divider ────────────────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(212,160,23,0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(S*0.25, 706); ctx.lineTo(S*0.75, 706); ctx.stroke();

  // ── OD / OS — larger scores (82px, was 54px) ─────────────────────────────
  const midX = S / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(midX, 726); ctx.lineTo(midX, 858); ctx.stroke();

  // Labels — bigger (22px, was 18px)
  ctx.fillStyle = 'rgba(242,242,247,0.38)';
  ctx.font = `500 22px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('RIGHT EYE', midX - 36, 748);
  ctx.textAlign = 'left';
  ctx.fillText('LEFT EYE', midX + 36, 748);

  // Scores — 82px (was 54px)
  ctx.fillStyle = 'rgba(242,242,247,0.92)';
  ctx.font = `bold 82px 'Fraunces', Georgia, serif`;
  ctx.textAlign = 'right';
  ctx.fillText(odSnellen, midX - 36, 848);
  ctx.textAlign = 'left';
  ctx.fillText(osSnellen, midX + 36, 848);

  // ── Bottom rule ───────────────────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(212,160,23,0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(S*0.12, 892); ctx.lineTo(S*0.88, 892); ctx.stroke();

  // ── Brand ─────────────────────────────────────────────────────────────────
  ctx.fillStyle = '#D4A017';
  ctx.font = `italic bold 30px 'Fraunces', Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Eye Chart Test by Dr. Evans, OD', S/2, 938);

  // URL — bigger (24px, was 20px)
  ctx.fillStyle = 'rgba(242,242,247,0.32)';
  ctx.font = `20px -apple-system, system-ui, sans-serif`;
  ctx.fillText('rjlcevans.com/eye-chart-test  ·  App Store', S/2, 976);
}

function download() {
  const link = document.createElement('a');
  link.download = 'share-card-mockup.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

draw();
</script>
</body>
</html>
