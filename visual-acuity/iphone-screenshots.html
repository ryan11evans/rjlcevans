<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #111; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 24px; font-family: -apple-system, sans-serif; }
  h1 { color: #D4A017; margin: 0; font-size: 22px; }
  p.sub { color: #888; margin: 0; font-size: 13px; text-align: center; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  canvas { border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.7); }
  .label { color: #888; font-size: 12px; }
  button { padding: 10px 24px; background: #D4A017; color: #111; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .err { color: #f66; font-size: 12px; max-width: 280px; }
</style>
<style>@font-face { font-family: 'Sloan'; src: url('Sloan.otf') format('opentype'); }</style>
</head>
<body>
<h1>iPhone App Store Screenshots &mdash; 6.7&rdquo; (1290 &times; 2796)</h1>
<p class="sub">5 screenshots with marketing copy. Download each and upload to App Store Connect.</p>
<div class="row" id="cards"></div>

<script>
const W = 1290, H = 2796;
const GOLD  = '#D4A017';
const DARK  = '#0a0a0a';
const INK   = '#f2f2f7';
const INK_S = 'rgba(242,242,247,0.62)';
const INK_M = 'rgba(242,242,247,0.35)';
const CARD  = '#1c1c1e';
const CARD2 = '#2c2c2e';
const PAD   = 64; // horizontal padding

// ── Helpers ──────────────────────────────────────────────────────────────────
function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function bg(ctx) {
  ctx.fillStyle = DARK;
  ctx.fillRect(0, 0, W, H);
  const g = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, H * 0.55);
  g.addColorStop(0, 'rgba(212,160,23,0.13)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x = 40; x < W; x += 40)
    for (let y = 40; y < H; y += 40) {
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
    }
}

// Caption: headline ~110px, sub ~58px — fills top ~680px of canvas
function caption(ctx, headline, sub) {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = INK;
  ctx.font = '800 110px -apple-system, "SF Pro Display", sans-serif';
  const words = headline.split(' ');
  let hLines = [], line = '';
  words.forEach(w => {
    const test = line ? line + ' ' + w : w;
    if (test.length > 17 && line) { hLines.push(line); line = w; }
    else line = test;
  });
  hLines.push(line);
  const lineH = 132;
  const topY = 210;
  hLines.forEach((l, i) => ctx.fillText(l, W/2, topY + i * lineH));

  if (sub) {
    ctx.fillStyle = INK_S;
    ctx.font = '400 56px -apple-system, sans-serif';
    const lastHL = topY + (hLines.length - 1) * lineH;
    const subY = lastHL + 88;
    const sw = sub.split(' ');
    let sl = [], sline = '';
    sw.forEach(w => {
      const t = sline ? sline + ' ' + w : w;
      if (t.length > 28 && sline) { sl.push(sline); sline = w; }
      else sline = t;
    });
    sl.push(sline);
    sl.forEach((l, i) => ctx.fillText(l, W/2, subY + i * 76));
  }
}

// caption() with the above settings ends at approximately:
// 2 headline lines, 2 sub lines:  topY=210, l2=342, subY=490, sl2=566 → ~566
// 2 headline lines, 1 sub line:   subY=490 → ~490

function bottomBar(ctx, text) {
  ctx.fillStyle = 'rgba(212,160,23,0.10)';
  ctx.fillRect(0, H - 180, W, 180);
  ctx.strokeStyle = 'rgba(212,160,23,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, H - 180); ctx.lineTo(W, H - 180); ctx.stroke();
  ctx.fillStyle = GOLD;
  ctx.font = '600 46px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, W/2, H - 88);
}

// Sloan pyramid logo + app name, starts at y
// Total height: ~360px
function titlePyramid(ctx, y) {
  ctx.fillStyle = GOLD;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = "normal 130px 'Sloan', monospace";
  ctx.fillText('E', W/2, y + 120);
  ctx.font = "normal 82px 'Sloan', monospace";
  ctx.fillText('F P', W/2, y + 222);
  ctx.font = "normal 52px 'Sloan', monospace";
  ctx.fillText('T O Z', W/2, y + 292);
  ctx.fillStyle = INK;
  ctx.font = '700 66px -apple-system, sans-serif';
  ctx.fillText('Eye Chart Test', W/2, y + 390);
  ctx.fillStyle = INK_S;
  ctx.font = '400 42px -apple-system, sans-serif';
  ctx.fillText('by Dr. Evans, OD', W/2, y + 448);
}

function drawBtn(ctx, x, y, w, h, label, gold) {
  if (gold) {
    const g = ctx.createLinearGradient(x, y, x+w, y+h);
    g.addColorStop(0, '#E8B420'); g.addColorStop(1, '#C49010');
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = CARD;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
  }
  rr(ctx, x, y, w, h, 36); ctx.fill();
  if (!gold) { rr(ctx, x, y, w, h, 36); ctx.stroke(); }
  ctx.fillStyle = gold ? '#111' : INK;
  ctx.font = (gold ? '700' : '500') + ' 52px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h/2);
}

// ── SCREEN 1: Home ────────────────────────────────────────────────────────────
// Caption ends ~566. UI: 680 → 2460. BottomBar: 2616.
function screen1(ctx) {
  bg(ctx);
  caption(ctx, 'Real Eye Test. At Home.',
    'Calibrated to your screen · Built by a licensed optometrist');

  const TX = PAD, TW = W - PAD*2;

  // App pyramid
  titlePyramid(ctx, 668);  // ends ~668+448=1116

  // Auto-detected badge
  ctx.fillStyle = 'rgba(212,160,23,0.12)';
  rr(ctx, TX, 1160, TW, 114, 57); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.42)'; ctx.lineWidth = 2;
  rr(ctx, TX, 1160, TW, 114, 57); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.font = '500 38px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✓  Auto-detected: iPhone 16 Pro · 460 ppi', W/2, 1217);

  // Mirror tile (active)
  ctx.fillStyle = 'rgba(212,160,23,0.10)';
  rr(ctx, TX, 1340, TW, 420, 40); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.50)'; ctx.lineWidth = 3;
  rr(ctx, TX, 1340, TW, 420, 40); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.font = '600 68px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('🪞  Mirror Test', TX + 52, 1470);
  ctx.fillStyle = INK_S; ctx.font = '400 50px -apple-system, sans-serif';
  ctx.fillText('Stand 6 ft back — most accurate', TX + 52, 1546);
  ctx.fillStyle = INK_M; ctx.font = '400 44px -apple-system, sans-serif';
  ctx.fillText('Best for a real visual acuity score', TX + 52, 1610);

  // Quick tile
  ctx.fillStyle = CARD;
  rr(ctx, TX, 1820, TW, 270, 40); ctx.fill();
  ctx.fillStyle = INK; ctx.font = '600 64px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('📱  Quick Test', TX + 52, 1922);
  ctx.fillStyle = INK_M; ctx.font = '400 46px -apple-system, sans-serif';
  ctx.fillText('Arms length · instant result', TX + 52, 1988);

  // Glasses toggle
  ctx.fillStyle = CARD;
  rr(ctx, TX, 2160, TW, 134, 36); ctx.fill();
  ctx.fillStyle = INK_S; ctx.font = '400 42px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Wearing glasses or contacts', TX + 52, 2227);
  ctx.fillStyle = 'rgba(120,120,128,0.32)';
  rr(ctx, W - PAD - 152, 2178, 152, 96, 48); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W - PAD - 152 + 46, 2226, 34, 0, Math.PI*2); ctx.fill();

  // CTA
  drawBtn(ctx, TX, 2368, TW, 164, 'Begin Test  →', true);

  bottomBar(ctx, 'Clinically calibrated for your exact iPhone model');
}

// ── SCREEN 2: Testing ─────────────────────────────────────────────────────────
// Caption ends ~490. Big letters from ~780 to ~1340. Rest fills down to ~2460.
function screen2(ctx) {
  bg(ctx);
  caption(ctx, 'Test at Distance, Like a Real Exam.',
    'Mirror mode · Most accurate at-home method');

  // BIG Sloan letters — hero of the screen
  ctx.fillStyle = '#ffffff';
  ctx.font = "normal 480px 'Sloan', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('D', W/2 - 306, 1080);
  ctx.fillText('K', W/2 + 306, 1080);

  // Progress dots
  const dR = 24, dSp = 120;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(W/2 + (i - 2) * dSp, 1480, i < 2 ? dR : dR * 0.55, 0, Math.PI*2);
    ctx.fillStyle = i < 2 ? GOLD : 'rgba(255,255,255,0.18)';
    ctx.fill();
  }

  // Letter answer boxes
  const bW = 188, bH = 188, bGap = 22;
  const bTotal = 5*bW + 4*bGap, bX = (W - bTotal)/2;
  for (let i = 0; i < 5; i++) {
    const x = bX + i*(bW + bGap);
    ctx.fillStyle = CARD2;
    rr(ctx, x, 1548, bW, bH, 30); ctx.fill();
    if (i === 0) {
      ctx.strokeStyle = GOLD; ctx.lineWidth = 5;
      rr(ctx, x, 1548, bW, bH, 30); ctx.stroke();
    }
  }

  // Mic + keyboard circles — pushed down to give 90px breathing room below letter boxes
  const circY = 1990;
  ctx.fillStyle = GOLD;
  ctx.beginPath(); ctx.arc(W/2 - 248, circY, 148, 0, Math.PI*2); ctx.fill();
  ctx.font = '114px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎤', W/2 - 248, circY + 8);

  ctx.fillStyle = CARD2;
  ctx.beginPath(); ctx.arc(W/2 + 248, circY, 148, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = INK_S;
  ctx.font = 'bold 72px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('abc', W/2 + 248, circY);

  ctx.fillStyle = INK; ctx.font = '500 46px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Speak', W/2 - 248, circY + 218);
  ctx.fillText('Type', W/2 + 248, circY + 218);

  ctx.fillStyle = GOLD; ctx.font = '400 40px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Say all letters — or "can\'t see" to skip', W/2, circY + 330);

  // Can't see / Submit
  const bBW = (W - PAD*2 - 60) / 2;
  drawBtn(ctx, PAD, circY + 420, bBW, 138, "Can't see line", false);
  drawBtn(ctx, PAD + bBW + 60, circY + 420, bBW, 138, 'Submit  →', false);

  bottomBar(ctx, 'Hands-free voice recognition built in');
}

// ── SCREEN 3: Results ─────────────────────────────────────────────────────────
// Caption ends ~566. Results from 680 to ~2460.
function screen3(ctx) {
  bg(ctx);
  caption(ctx, 'Both Eyes. 60 Seconds.',
    'Test each eye separately · with or without glasses');

  const TX = PAD, TW = W - PAD*2;

  ctx.fillStyle = INK; ctx.font = '700 64px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('Your Results', W/2, 726);

  // OD card
  ctx.fillStyle = CARD; rr(ctx, TX, 778, TW, 484, 44); ctx.fill();
  const og = ctx.createRadialGradient(W/2, 900, 0, W/2, 900, 520);
  og.addColorStop(0, 'rgba(212,160,23,0.13)'); og.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = og; rr(ctx, TX, 778, TW, 484, 44); ctx.fill();
  ctx.fillStyle = INK_M; ctx.font = '400 40px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('RIGHT EYE (OD)', W/2, 860);
  ctx.fillStyle = GOLD; ctx.font = "bold 230px 'Fraunces', Georgia, serif";
  ctx.fillText('20/20', W/2, 1106);
  ctx.fillStyle = INK_S; ctx.font = '400 40px -apple-system, sans-serif';
  ctx.fillText('Normal vision', W/2, 1212);

  // OS card
  ctx.fillStyle = CARD; rr(ctx, TX, 1322, TW, 450, 44); ctx.fill();
  ctx.fillStyle = INK_M; ctx.font = '400 40px -apple-system, sans-serif';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('LEFT EYE (OS)', W/2, 1406);
  ctx.fillStyle = INK; ctx.font = "bold 230px 'Fraunces', Georgia, serif";
  ctx.fillText('20/40', W/2, 1644);
  ctx.fillStyle = INK_S; ctx.font = '400 40px -apple-system, sans-serif';
  ctx.fillText('Mild blur — glasses may help', W/2, 1752);

  // Referral note
  ctx.fillStyle = 'rgba(212,160,23,0.08)';
  rr(ctx, TX, 1832, TW, 148, 36); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.28)'; ctx.lineWidth = 2;
  rr(ctx, TX, 1832, TW, 148, 36); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.font = '400 32px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('👁️  Eye exam recommended with your optometrist', W/2, 1906);

  // Share button
  drawBtn(ctx, TX, 2050, TW, 162, '↑  Share your results', true);

  // Mini share card — y=2240, h=336 ends at 2576, well above bottomBar at 2616
  ctx.fillStyle = CARD; rr(ctx, TX, 2240, TW, 336, 44); ctx.fill();
  const cg = ctx.createRadialGradient(W/2, 2408, 0, W/2, 2408, 300);
  cg.addColorStop(0, 'rgba(212,160,23,0.16)'); cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg; rr(ctx, TX, 2240, TW, 336, 44); ctx.fill();
  ctx.fillStyle = GOLD; ctx.font = "bold 100px 'Fraunces', Georgia, serif";
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('20/20', W/2, 2360);
  ctx.fillStyle = INK_S; ctx.font = '400 30px -apple-system, sans-serif';
  ctx.fillText('Visual Acuity · Best Eye', W/2, 2412);
  ctx.strokeStyle = 'rgba(212,160,23,0.22)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*0.3, 2444); ctx.lineTo(W*0.7, 2444); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.font = "italic 600 32px 'Fraunces', Georgia, serif";
  ctx.fillText('Eye Chart Test by Dr. Evans, OD', W/2, 2484);

  bottomBar(ctx, 'Share results with your doctor or friends');
}

// ── SCREEN 4: Credibility ─────────────────────────────────────────────────────
// Caption ends ~642. Content 760 → 2460.
function screen4(ctx) {
  bg(ctx);
  // Extra center glow
  const g2 = ctx.createRadialGradient(W/2, H*0.45, 0, W/2, H*0.45, 620);
  g2.addColorStop(0, 'rgba(212,160,23,0.17)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  caption(ctx, 'Built by a Real Eye Doctor',
    'A licensed optometrist · built it right');

  const TX = PAD, TW = W - PAD*2;

  // App pyramid
  titlePyramid(ctx, 608);  // ends ~608+448=1056

  // Dr card — h=350, content fills it symmetrically
  ctx.fillStyle = 'rgba(212,160,23,0.10)';
  rr(ctx, TX, 1110, TW, 350, 44); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.38)'; ctx.lineWidth = 2;
  rr(ctx, TX, 1110, TW, 350, 44); ctx.stroke();

  // Avatar — centered in card (1110+175=1285)
  const avX = TX + 96, avY = 1285;
  ctx.fillStyle = 'rgba(212,160,23,0.18)';
  ctx.beginPath(); ctx.arc(avX, avY, 86, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.45)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(avX, avY, 86, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 56px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('OD', avX, avY);

  // Dr info — text block vertically centred with avatar
  ctx.fillStyle = GOLD; ctx.font = '700 52px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('Dr. Ryan Evans, OD', TX + 216, 1249);
  ctx.fillStyle = INK_S; ctx.font = '400 38px -apple-system, sans-serif';
  [
    "Calibrates to your screen's pixel density",
    "the same way we do it in a real exam room.",
  ].forEach((l, i) => ctx.fillText(l, TX + 216, 1307 + i * 52));

  // Feature bullets: 5 rows, h=158, gap=20 → total 5*158+4*20=870
  // Start 1610, end 1610+870=2480
  const feats = [
    ['📏', 'True calibration — your exact screen ppi'],
    ['🪞', 'Mirror mode — test at 12 ft, not 12 inches'],
    ['👁️', 'Both eyes, glasses on and off'],
    ['🎙️', 'Hands-free voice input'],
    ['🔒', 'No data leaves your phone. Ever.'],
  ];
  let fy = 1618;
  feats.forEach(([icon, text]) => {
    ctx.fillStyle = CARD;
    rr(ctx, TX, fy, TW, 158, 30); ctx.fill();
    ctx.fillStyle = INK; ctx.font = '500 42px -apple-system, sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(icon + '  ' + text, TX + 52, fy + 79);
    fy += 178;
  });

  bottomBar(ctx, 'Every letter is the mathematically correct size');
}

// ── SCREEN 5: Value / share card ──────────────────────────────────────────────
// Caption ends ~490 (1 sub line). Share card 570 → 2310. Bullets 2370+.
function screen5(ctx) {
  bg(ctx);
  // Center glow behind card
  const g2 = ctx.createRadialGradient(W/2, H*0.52, 0, W/2, H*0.52, 720);
  g2.addColorStop(0, 'rgba(212,160,23,0.20)'); g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  caption(ctx, '$0.99. No Subscription.',
    'Buy once, keep forever · No account, no ads');

  // Share card outer
  const cX = PAD, cW = W - PAD*2, cY = 560;
  const cH = 1690;
  ctx.fillStyle = '#0c0c0c';
  rr(ctx, cX, cY, cW, cH, 56); ctx.fill();
  ctx.strokeStyle = 'rgba(212,160,23,0.38)'; ctx.lineWidth = 2;
  rr(ctx, cX, cY, cW, cH, 56); ctx.stroke();

  // Watermark Snellen rows
  ctx.save();
  ctx.globalAlpha = 0.17;
  ctx.fillStyle = GOLD; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  [
    ['E',       108, cY + 28 ],
    ['F P',      72, cY + 148],
    ['T O Z',    48, cY + 232],
    ['L P E D',  32, cY + 292],
  ].forEach(([t, s, y]) => {
    ctx.font = '700 ' + s + 'px Georgia, serif';
    ctx.fillText(t, W/2, y);
  });
  ctx.restore();

  // Eyebrow — below watermark last row (ends cY+324), starts cY+390
  ctx.fillStyle = 'rgba(212,160,23,0.62)';
  ctx.font = '500 30px -apple-system, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('EYE CHART TEST  ·  DR. EVANS, OD', W/2, cY + 390);

  // Big score — 220px Fraunces, baseline cY+630, descender bottom ~cY+680
  ctx.fillStyle = GOLD; ctx.font = "bold 220px 'Fraunces', Georgia, serif";
  ctx.fillText('20/20', W/2, cY + 630);

  // Sub label — 80px gap below score descender
  ctx.fillStyle = 'rgba(242,242,247,0.40)';
  ctx.font = '500 32px -apple-system, sans-serif';
  ctx.fillText('VISUAL ACUITY  ·  BEST EYE', W/2, cY + 760);

  // Divider
  ctx.strokeStyle = 'rgba(212,160,23,0.26)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*0.26, cY+812); ctx.lineTo(W*0.74, cY+812); ctx.stroke();

  // OD / OS row
  const midX = W / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(midX, cY+832); ctx.lineTo(midX, cY+1068); ctx.stroke();

  ctx.fillStyle = 'rgba(242,242,247,0.36)';
  ctx.font = '500 28px -apple-system, sans-serif';
  ctx.textAlign = 'right'; ctx.fillText('RIGHT EYE', midX - 40, cY + 876);
  ctx.textAlign = 'left';  ctx.fillText('LEFT EYE',  midX + 40, cY + 876);

  ctx.fillStyle = 'rgba(242,242,247,0.92)';
  ctx.font = "bold 108px 'Fraunces', Georgia, serif";
  ctx.textAlign = 'right'; ctx.fillText('20/20', midX - 40, cY + 1046);
  ctx.textAlign = 'left';  ctx.fillText('20/25', midX + 40, cY + 1046);

  // Bottom rule
  ctx.strokeStyle = 'rgba(212,160,23,0.20)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W*0.1, cY+1126); ctx.lineTo(W*0.9, cY+1126); ctx.stroke();

  // Brand
  ctx.fillStyle = GOLD;
  ctx.font = "italic bold 38px 'Fraunces', Georgia, serif";
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('Eye Chart Test by Dr. Evans, OD', W/2, cY + 1236);

  ctx.fillStyle = 'rgba(242,242,247,0.28)';
  ctx.font = '26px -apple-system, sans-serif';
  ctx.fillText('rjlcevans.com/eye-chart-test  ·  App Store', W/2, cY + 1298);

  // Privacy bullets (below card)
  const pvY = cY + cH + 88;
  const cols = [
    ['🔒', 'No account required'],
    ['📵',  'No ads. No tracking.'],
    ['📱',  'On-device only'],
  ];
  const colW = cW / 3;
  cols.forEach(([icon, text], i) => {
    const cx = cX + colW * i + colW / 2;
    ctx.fillStyle = INK_M; ctx.font = '400 40px -apple-system, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText(icon, cx, pvY);
    ctx.fillStyle = INK_S; ctx.font = '400 32px -apple-system, sans-serif';
    ctx.fillText(text, cx, pvY + 58);
  });

  bottomBar(ctx, 'One-time purchase · $0.99 · No hidden fees');
}

// ── Render ────────────────────────────────────────────────────────────────────
const screens = [
  { fn: screen1, label: 'Screen 1 — Home',        file: 'iphone-screenshot-1.png' },
  { fn: screen2, label: 'Screen 2 — Testing',     file: 'iphone-screenshot-2.png' },
  { fn: screen3, label: 'Screen 3 — Results',     file: 'iphone-screenshot-3.png' },
  { fn: screen4, label: 'Screen 4 — Credibility', file: 'iphone-screenshot-4.png' },
  { fn: screen5, label: 'Screen 5 — Value',       file: 'iphone-screenshot-5.png' },
];

function makeCard(s) {
  const div = document.createElement('div');
  div.className = 'card';
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  c.style.width  = Math.round(W / 4.5) + 'px';
  c.style.height = Math.round(H / 4.5) + 'px';
  div.appendChild(c);
  document.getElementById('cards').appendChild(div);

  try {
    s.fn(c.getContext('2d'));
  } catch(e) {
    const errEl = document.createElement('p');
    errEl.className = 'err';
    errEl.textContent = s.label + ': ' + e.message;
    div.appendChild(errEl);
  }

  const lbl = document.createElement('p');
  lbl.className = 'label';
  lbl.textContent = s.label + ' · ' + W + '×' + H;
  div.appendChild(lbl);

  const dlBtn = document.createElement('button');
  dlBtn.textContent = 'Download';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.download = s.file;
    a.href = c.toDataURL('image/png');
    a.click();
  };
  div.appendChild(dlBtn);
}

let rendered = false;
function render() {
  if (rendered) return;
  rendered = true;
  screens.forEach(makeCard);
}

const sloan = new FontFace('Sloan', 'url(Sloan.otf)');
sloan.load()
  .then(f => { document.fonts.add(f); render(); })
  .catch(render);
setTimeout(render, 1500);
</script>
</body>
