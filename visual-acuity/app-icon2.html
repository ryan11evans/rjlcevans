<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .icon {
    width: 1024px;
    height: 1024px;
    background: radial-gradient(ellipse at 40% 35%, #242424 0%, #141414 70%);
    border-radius: 230px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }
  .row {
    font-family: 'Courier New', monospace;
    font-weight: 900;
    color: #D4A017;
    line-height: 1.15;
    letter-spacing: 0.12em;
    text-shadow: 0 0 60px rgba(212,160,23,0.2);
  }
  .r1 { font-size: 260px; letter-spacing: 0.08em; }
  .r2 { font-size: 162px; opacity: 0.75; letter-spacing: 0.18em; }
  .r3 { font-size: 104px; opacity: 0.45; letter-spacing: 0.25em; }
</style>
</head>
<body>
  <div class="icon">
    <div class="row r1">E</div>
    <div class="row r2">FP</div>
    <div class="row r3">TOZ</div>
  </div>
</body>
</html>
