<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapBTC Layout Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro Rounded', BlinkMacSystemFont, sans-serif;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: linear-gradient(160deg, #1f1d1a 0%, #111009 50%, #050505 100%);
    border-radius: 54px;
    border: 2px solid #333;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px #222;
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px 0;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { fill: #fff; }

  /* Navigation bar */
  .nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .nav-leading, .nav-trailing { display: flex; gap: 20px; align-items: center; }
  .nav-icon { color: rgba(255,255,255,0.5); font-size: 17px; cursor: pointer; }
  .nav-icon.active { color: #f5a623; }
  .nav-title { font-size: 17px; font-weight: 600; color: #fff; }

  /* Scroll content */
  .scroll-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Price header */
  .price-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 12px;
    flex-shrink: 0;
  }
  .btc-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-bottom: 4px;
  }
  .btc-label .btc-icon { color: #f5a623; font-size: 14px; }
  .price-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  .price-big {
    font-size: 50px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -1px;
  }
  .change-badge {
    background: rgba(30, 209, 89, 0.15);
    color: #30d358;
    font-size: 14px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .session-delta {
    color: #30d358;
    font-size: 12px;
    font-weight: 600;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* Content area */
  .content-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
    flex: 1;
  }

  /* Chart */
  .chart-container {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    height: 140px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .chart-label {
    position: absolute;
    top: 10px;
    left: 12px;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chart-price {
    position: absolute;
    top: 10px;
    right: 12px;
    color: #30d358;
    font-size: 12px;
    font-weight: 700;
  }
  .chart-svg {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
  }

  /* Info section with orbit logo */
  .info-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 2px;
  }

  /* Orbit logo */
  .orbit-logo {
    width: 100px;
    height: 100px;
    position: relative;
    flex-shrink: 0;
  }
  .orbit-glow {
    position: absolute;
    inset: -10px;
    background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .orbit-coin {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: linear-gradient(160deg, #fbb246 0%, #f79318 50%, #e47f07 100%);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), 0 2px 8px rgba(245,166,35,0.4);
    border: 1.5px solid rgba(200,110,5,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orbit-b {
    font-size: 45px;
    font-weight: 700;
    color: rgba(25,18,5,0.9);
    line-height: 1;
    margin-top: -2px;
  }
  .orbit-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: #f5a623;
    border-bottom-color: #f5a623;
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stat tiles grid */
  .tiles-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .tile-row {
    display: flex;
    gap: 10px;
  }
  .stat-tile {
    flex: 1;
    padding: 10px 12px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .tile-label {
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .tile-value {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.1;
  }
  .tile-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tile-green  { background: rgba(30,209,89,0.08);   border: 1px solid rgba(30,209,89,0.2);   }
  .tile-green  .tile-value { color: #30d358; }
  .tile-red    { background: rgba(255,69,58,0.08);   border: 1px solid rgba(255,69,58,0.2);   }
  .tile-red    .tile-value { color: #ff453a; }
  .tile-orange { background: rgba(255,159,10,0.08);  border: 1px solid rgba(255,159,10,0.2);  }
  .tile-orange .tile-value { color: #ff9f0a; }
  .tile-cyan   { background: rgba(90,200,250,0.08);  border: 1px solid rgba(90,200,250,0.2);  }
  .tile-cyan   .tile-value { color: #5ac8fa; }
  .tile-purple { background: rgba(191,90,242,0.08);  border: 1px solid rgba(191,90,242,0.2);  }
  .tile-purple .tile-value { color: #bf5af2; }
  .tile-gold   { background: rgba(255,214,10,0.08);  border: 1px solid rgba(255,214,10,0.2);  }
  .tile-gold   .tile-value { color: #ffd60a; }

  /* Refresh status */
  .refresh-status {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    padding: 6px 0 4px;
    flex-shrink: 0;
  }

  /* Home indicator */
  .home-indicator {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .home-bar {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="dynamic-island"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C10.8 2.5 13.3 3.7 15 5.7L16 4.5C14 2.2 11.2 0.8 8 0.8C4.8 0.8 2 2.2 0 4.5L1 5.7C2.7 3.7 5.2 2.5 8 2.5Z" opacity="0.3"/><path d="M8 5C10 5 11.8 5.9 13 7.3L14 6C12.5 4.4 10.4 3.4 8 3.4C5.6 3.4 3.5 4.4 2 6L3 7.3C4.2 5.9 6 5 8 5Z" opacity="0.6"/><path d="M8 7.5C9.2 7.5 10.3 8 11 8.8L12 7.5C11 6.4 9.6 5.8 8 5.8C6.4 5.8 5 6.4 4 7.5L5 8.8C5.7 8 6.8 7.5 8 7.5Z"/><circle cx="8" cy="11" r="1.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/><rect x="23" y="4" width="2" height="4" rx="1" fill="rgba(255,255,255,0.4)"/><rect x="1.5" y="2.5" width="15" height="7" rx="1.5" fill="rgba(255,255,255,0.9)"/></svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <div class="nav-leading">
      <span class="nav-icon active">🔔</span>
      <span class="nav-icon">⚙️</span>
    </div>
    <span class="nav-title">Bitcoin</span>
    <div class="nav-trailing">
      <span class="nav-icon">±</span>
      <span class="nav-icon">↑□</span>
    </div>
  </div>

  <!-- Scroll Content -->
  <div class="scroll-content">

    <!-- Price Header -->
    <div class="price-header">
      <div class="btc-label">
        <span class="btc-icon">₿</span>
        <span>BTC / USD</span>
      </div>
      <div class="price-row">
        <span class="price-big">$103,842</span>
        <span class="change-badge">+2.4%</span>
      </div>
      <div class="session-delta">↑ +$1,240 (+1.2%) this session</div>
    </div>

    <!-- Main Content -->
    <div class="content-area">

      <!-- Chart -->
      <div class="chart-container">
        <div class="chart-label">7-Day Price</div>
        <div class="chart-price">+2.4%</div>
        <svg class="chart-svg" viewBox="0 0 358 100" preserveAspectRatio="none" height="110">
          <defs>
            <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#30d358" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#30d358" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="M0,75 C20,70 30,80 50,72 C70,64 80,68 100,60 C120,52 130,58 150,48 C170,38 180,44 200,36 C220,28 230,32 250,24 C270,16 280,20 300,14 C320,8 340,12 358,6 L358,100 L0,100 Z" fill="url(#chartGrad)"/>
          <path d="M0,75 C20,70 30,80 50,72 C70,64 80,68 100,60 C120,52 130,58 150,48 C170,38 180,44 200,36 C220,28 230,32 250,24 C270,16 280,20 300,14 C320,8 340,12 358,6" fill="none" stroke="#30d358" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Info Section -->
      <div class="info-section">

        <!-- Orbit Logo -->
        <div class="orbit-logo">
          <div class="orbit-glow"></div>
          <div class="orbit-coin">
            <span class="orbit-b">₿</span>
          </div>
          <div class="orbit-ring"></div>
        </div>

        <!-- Stat Tiles Grid -->
        <div class="tiles-grid">
          <!-- Row 1: 24h High / 24h Low -->
          <div class="tile-row">
            <div class="stat-tile tile-green">
              <div class="tile-label">24h High</div>
              <div class="tile-value">$104,210</div>
              <div class="tile-sub">&nbsp;</div>
            </div>
            <div class="stat-tile tile-red">
              <div class="tile-label">24h Low</div>
              <div class="tile-value">$101,580</div>
              <div class="tile-sub">&nbsp;</div>
            </div>
          </div>
          <!-- Row 2: ATH / Block Height -->
          <div class="tile-row">
            <div class="stat-tile tile-orange">
              <div class="tile-label">All-Time High</div>
              <div class="tile-value">$109,241</div>
              <div class="tile-sub">Jan 20, 2025</div>
            </div>
            <div class="stat-tile tile-cyan">
              <div class="tile-label">Block Height</div>
              <div class="tile-value">#899,142</div>
              <div class="tile-sub">&nbsp;</div>
            </div>
          </div>
          <!-- Row 3: Next Halving / Fear & Greed -->
          <div class="tile-row">
            <div class="stat-tile tile-purple">
              <div class="tile-label">Next Halving</div>
              <div class="tile-value">~3.9 yrs</div>
              <div class="tile-sub">Block #1,050,000 · 150,858 left</div>
            </div>
            <div class="stat-tile tile-gold">
              <div class="tile-label">Fear &amp; Greed</div>
              <div class="tile-value">72</div>
              <div class="tile-sub">Greed</div>
            </div>
          </div>
        </div>

      </div><!-- /info-section -->

      <!-- Refresh status -->
      <div class="refresh-status">Updated 30 seconds ago</div>

    </div><!-- /content-area -->
  </div><!-- /scroll-content -->

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>
</div>

</body>
</html>
