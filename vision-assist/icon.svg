<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="va-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d2233"/>
      <stop offset="100%" stop-color="#081520"/>
    </radialGradient>
    <radialGradient id="va-iris" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6ee8f2"/>
      <stop offset="55%" stop-color="#2ab8cc"/>
      <stop offset="100%" stop-color="#1a7a90"/>
    </radialGradient>
    <linearGradient id="va-scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="va-eye">
      <ellipse cx="50" cy="45" rx="35" ry="21"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#va-bg)"/>

  <!-- Eye white -->
  <ellipse cx="50" cy="45" rx="35" ry="21" fill="#ddeef5"/>

  <!-- Iris -->
  <circle cx="50" cy="45" r="15" fill="url(#va-iris)" clip-path="url(#va-eye)"/>

  <!-- Iris texture -->
  <g clip-path="url(#va-eye)" opacity="0.25">
    <line x1="50" y1="30" x2="50" y2="60" stroke="#0a4a5a" stroke-width="0.5"/>
    <line x1="35" y1="45" x2="65" y2="45" stroke="#0a4a5a" stroke-width="0.5"/>
    <line x1="39" y1="34" x2="61" y2="56" stroke="#0a4a5a" stroke-width="0.4"/>
    <line x1="61" y1="34" x2="39" y2="56" stroke="#0a4a5a" stroke-width="0.4"/>
  </g>

  <!-- Pupil -->
  <circle cx="50" cy="45" r="7" fill="#040e16" clip-path="url(#va-eye)"/>

  <!-- Highlight -->
  <ellipse cx="44.5" cy="40.5" rx="2.8" ry="2" fill="white" opacity="0.9"/>

  <!-- Eyelid top -->
  <path d="M15 45 Q50 17 85 45" stroke="#081520" stroke-width="1.5" fill="none"/>
  <!-- Eyelid bottom -->
  <path d="M15 45 Q50 65 85 45" stroke="#081520" stroke-width="1" fill="none"/>

  <!-- Scan beam glow -->
  <rect x="15" y="42.5" width="70" height="5" fill="url(#va-scan)" rx="1" clip-path="url(#va-eye)"/>
  <!-- Scan line sharp center -->
  <line x1="15" y1="45" x2="85" y2="45" stroke="#00e5ff" stroke-width="1.2" opacity="0.95" clip-path="url(#va-eye)"/>
  <!-- Scan endpoints -->
  <circle cx="15" cy="45" r="1.8" fill="#00e5ff" opacity="0.85"/>
  <circle cx="85" cy="45" r="1.8" fill="#00e5ff" opacity="0.85"/>

  <!-- Text lines below eye (OCR output) -->
  <line x1="20" y1="74" x2="56" y2="74" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
  <line x1="20" y1="81" x2="46" y2="81" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="59" y1="74" x2="78" y2="74" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
</svg>
