<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Assist • Dr. Evans</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?
family=Roboto+Mono:wght@400;700&display=swap');
:root {
--bg: #111111;
--text: #ffffff;
--accent: #00ccff;
}
body {
margin: 0;
padding: 0;
background: var(--bg);
color: var(--text);
font-family: 'Roboto Mono', monospace;
overflow: hidden;
height: 100vh;
}
.header {
background: #1a1a1a;
padding: 15px 20px;
text-align: center;
font-size: 28px;
font-weight: 700;
border-bottom: 3px solid var(--accent);
}
.nav {
display: flex;
background: #222;
padding: 10px;
gap: 10px;
justify-content: center;
}
.nav button {
padding: 12px 24px;
font-size: 18px;
background: #333;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
}
.nav button.active {
background: var(--accent);
color: #000;
}
.screen {
display: none;
height: calc(100vh - 120px);
overflow: auto;
padding: 20px;
}
.screen.active {
display: block;
}
video, img {
width: 100%;
max-height: 50vh;
object-fit: contain;
border: 4px solid #333;
border-radius: 12px;
background: #000;
}
.controls {
display: flex;
flex-wrap: wrap;
gap: 12px;
margin: 15px 0;
justify-content: center;
}
button {
padding: 14px 28px;
font-size: 20px;
background: var(--accent);
color: #000;
border: none;
border-radius: 12px;
cursor: pointer;
font-weight: 700;
}
button.secondary {
background: #333;
color: white;
}
.text-viewer {
background: #1a1a1a;
padding: 25px;
border-radius: 12px;
max-height: 55vh;
overflow-y: auto;
line-height: 1.6;
font-size: 28px;
white-space: pre-wrap;
}
.settings-panel {
background: #222;
padding: 20px;
border-radius: 12px;
margin-top: 15px;
}
label {
font-size: 18px;
display: block;
margin: 12px 0 6px;
}
input[type="range"] {
width: 100%;
}
</style>
</head>
<body>
<div class="header">Vision Assist • Dr. Evans</div>
<div class="nav">
<button onclick="showScreen(0)" class="active" id="nav-0">Live Magnifier</button>
<button onclick="showScreen(1)" id="nav-1">Capture Label</button>
<button onclick="showScreen(2)" id="nav-2">Text Viewer</button>
<button onclick="showScreen(3)" id="nav-3">Settings</button>
</div>
<!-- Screen 0: Live Magnifier -->
<div id="screen-0" class="screen active">
<video id="live-video" autoplay playsinline></video>
<div class="controls">
<button onclick="toggleFlash()">🔦 Flashlight</button>
<button onclick="captureSnapshot()">📸 Capture</button>
<button onclick="zoomIn()">🔍 + Zoom</button>
<button onclick="zoomOut()">🔍 – Zoom</button>
</div>
<div class="settings-panel">
<label>Contrast: <span id="contrast-val">100</span>%</label>
<input type="range" id="contrast-slider" min="50" max="200" value="100"
oninput="applyFilters()">
<label>Zoom: <span id="zoom-val">1</span>x</label>
<input type="range" id="zoom-slider" min="1" max="8" value="1" step="0.1"
oninput="applyFilters()">
</div>
</div>
<!-- Screen 1: Capture / Upload -->
<div id="screen-1" class="screen">
<input type="file" id="upload-input" accept="image/*" style="display:none;"
onchange="handleUpload(event)">
<div class="controls">
<button onclick="startCamera()">📹 Start Camera</button>
<button onclick="document.getElementById('upload-input').click()">📤 Upload
Photo</button>
</div>
<canvas id="snapshot-canvas" style="display:none;"></canvas>
<img id="preview-image" alt="Captured label">
<div class="controls">
<button onclick="processOCR()" id="ocr-btn" style="display:none;">🔍 OCR</button>
</div>
</div>
Process with
<!-- Screen 2: Text Viewer -->
<div id="screen-2" class="screen">
<div class="text-viewer" id="reflowed-text" contenteditable="true"></div>
<div class="controls">
<button onclick="readAloud()">🔊 Read Entire Label</button>
<button onclick="stopReading()" class="secondary">⏹ Stop</button>
<button onclick="clearText()" class="secondary">Clear</button>
</div>
<div class="settings-panel">
<label>Font Size: <span id="font-size-val">28</span>px</label>
<input type="range" id="font-size-slider" min="16" max="80" value="28"
oninput="updateTextStyle()">
<label>Line Spacing: <span id="line-height-val">1.6</span></label>
<input type="range" id="line-height-slider" min="1" max="3" value="1.6" step="0.1"
oninput="updateTextStyle()">
</div>
</div>
<!-- Screen 3: Settings -->
<div id="screen-3" class="screen">
<h2 style="text-align:center; font-size:32px;">Low-Vision Settings</h2>
<div class="settings-panel">
<p><strong>Developed by Dr. Evans, Optometrist</strong></p>
<p>This prototype demonstrates the core functionality of Vision Assist. All processing
happens in your browser.</p>
<button onclick="showScreen(0)" style="width:100%; margin-top:20px;">Return to
Live Magnifier</button>
</div>
</div>
<script>
let stream = null;
let currentZoom = 1;
let synth = window.speechSynthesis;
let utterance = null;
function showScreen(n) {
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.getElementById(`screen-${n}`).classList.add('active');
document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
document.getElementById(`nav-${n}`).classList.add('active');
}
// Live Camera
async function startLiveCamera() {
try {
stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:
"environment" } });
const video = document.getElementById('live-video');
video.srcObject = stream;
} catch (err) {
alert("Camera access denied or not available.");
}
function toggleFlash() {
alert("Flashlight simulation active (native iOS version will use true torch).");
}
}
function zoomIn() { currentZoom = Math.min(8, currentZoom + 0.5); applyFilters(); }
function zoomOut() { currentZoom = Math.max(1, currentZoom - 0.5); applyFilters(); }
function applyFilters() {
const video = document.getElementById('live-video');
const contrast = document.getElementById('contrast-slider').value;
const zoom = document.getElementById('zoom-slider').value;
video.style.filter = `contrast(${contrast}%)`;
video.style.transform = `scale(${zoom})`;
document.getElementById('contrast-val').textContent = contrast;
document.getElementById('zoom-val').textContent = zoom;
}
// Capture Snapshot
function captureSnapshot() {
const video = document.getElementById('live-video');
const canvas = document.createElement('canvas');
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
canvas.getContext('2d').drawImage(video, 0, 0);
document.getElementById('preview-image').src = canvas.toDataURL('image/png');
document.getElementById('ocr-btn').style.display = 'inline-block';
showScreen(1);
}
// Upload handling
function handleUpload(e) {
const file = e.target.files[0];
if (file) {
const reader = new FileReader();
reader.onload = function(ev) {
document.getElementById('preview-image').src = ev.target.result;
document.getElementById('ocr-btn').style.display = 'inline-block';
};
reader.readAsDataURL(file);
}
}
// OCR Processing
async function processOCR() {
const btn = document.getElementById('ocr-btn');
btn.textContent = 'Processing…';
btn.disabled = true;
const image = document.getElementById('preview-image').src;
try {
const worker = await Tesseract.createWorker('eng', 1, {
logger: m => console.log(m)
});
const result = await worker.recognize(image);
await worker.terminate();
const extractedText = result.data.text.trim() || "No text detected. Please try another
photo.";
document.getElementById('reflowed-text').innerText = extractedText;
showScreen(2);
} catch (err) {
alert("OCR processing failed. Using sample text for demo.");
document.getElementById('reflowed-text').innerText = "Take 1 tablet by mouth every
8 hours as needed for pain.\n\nWarning: May cause drowsiness.\nExpiration: 12/2028";
showScreen(2);
}
btn.textContent = '🔍 btn.disabled = false;
Process with OCR';
}
// Text-to-Speech
function readAloud() {
if (utterance) synth.cancel();
const text = document.getElementById('reflowed-text').innerText;
utterance = new SpeechSynthesisUtterance(text);
utterance.rate = 0.9;
utterance.pitch = 1;
synth.speak(utterance);
function stopReading() {
if (utterance) synth.cancel();
}
}
function updateTextStyle() {
const textEl = document.getElementById('reflowed-text');
const fontSize = document.getElementById('font-size-slider').value;
const lineHeight = document.getElementById('line-height-slider').value;
textEl.style.fontSize = fontSize + 'px';
textEl.style.lineHeight = lineHeight;
document.getElementById('font-size-val').textContent = fontSize;
document.getElementById('line-height-val').textContent = lineHeight;
}
function clearText() {
document.getElementById('reflowed-text').innerText = '';
}
// Start live camera on load
window.onload = () => {
startLiveCamera();
};
</script>
</body>
</html>
