<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vision Impairment Simulator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        video, canvas { max-width: 100%; border: 2px solid #ddd; border-radius: 8px; display: block; margin: 10px 0; }
        button { padding: 14px 24px; margin: 5px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 16px; }
        .controls { margin: 20px 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="range"] { width: 100%; }
        .disclaimer { font-size: 0.9em; color: #555; margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vision Impairment Simulator</h1>
        <p><strong>Educational tool only.</strong> Not for clinical diagnosis. Built by Ryan Evans, Optometrist.</p>

        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:15px;">
            <button onclick="startWebcam()">Start Camera</button>
            <button onclick="stopWebcam()">Stop Camera</button>
            <label style="background:#eee; padding:12px 20px; border-radius:10px; cursor:pointer;">
                📸 Upload Image <input type="file" id="upload" accept="image/*" onchange="handleUpload(event)" style="display:none;">
            </label>
        </div>

        <video id="video" autoplay playsinline style="display:none; width:100%;"></video>
        <canvas id="canvas" style="width:100%;"></canvas>

        <div class="controls">
            <div><label>Myopia Blur (px): <span id="blurVal">0</span></label><input type="range" id="blur" min="0" max="20" value="0" step="0.5" oninput="applyFilters()"></div>
            <div><label>Cataract Haze: <span id="hazeVal">0</span></label><input type="range" id="haze" min="0" max="100" value="0" oninput="applyFilters()"></div>
            <div><label>Color Deficiency:</label>
                <select id="colorDef" onchange="applyFilters()">
                    <option value="none">None</option>
                    <option value="protanopia">Protanopia</option>
                    <option value="deuteranopia">Deuteranopia</option>
                    <option value="tritanopia">Tritanopia</option>
                </select>
            </div>
            <button onclick="resetFilters()">Reset All</button>
        </div>

        <div class="disclaimer">
            <a href="https://rjlcevans.com/">← Return to Evans Family Home</a>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d', { willReadFrequently: true });
        let stream = null;

        function startWebcam() {
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            }).then(s => {
                stream = s;
                video.srcObject = s;
                video.style.display = 'block';
                video.play();
            }).catch(err => {
                alert("Camera access failed. Please allow camera permission in Safari.");
                console.error(err);
            });
        }

        function stopWebcam() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.style.display = 'none';
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = URL.createObjectURL(file);
        }

            if (canvas.width === 0) return;
