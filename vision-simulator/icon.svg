<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2d2a4a"/>
      <stop offset="100%" stop-color="#1a1730"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7ab8d4"/>
      <stop offset="60%" stop-color="#4a8aaa"/>
      <stop offset="100%" stop-color="#2a5a74"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <clipPath id="eyeClip">
      <ellipse cx="50" cy="50" rx="38" ry="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Eye white -->
  <ellipse cx="50" cy="50" rx="38" ry="24" fill="#e8e8e8"/>

  <!-- Iris -->
  <circle cx="50" cy="50" r="18" fill="url(#irisGrad)" clip-path="url(#eyeClip)"/>

  <!-- Iris texture lines -->
  <g clip-path="url(#eyeClip)" opacity="0.3">
    <line x1="50" y1="32" x2="50" y2="68" stroke="#1a4a64" stroke-width="0.5"/>
    <line x1="32" y1="50" x2="68" y2="50" stroke="#1a4a64" stroke-width="0.5"/>
    <line x1="37" y1="37" x2="63" y2="63" stroke="#1a4a64" stroke-width="0.5"/>
    <line x1="63" y1="37" x2="37" y2="63" stroke="#1a4a64" stroke-width="0.5"/>
    <line x1="39" y1="33" x2="61" y2="67" stroke="#1a4a64" stroke-width="0.4"/>
    <line x1="61" y1="33" x2="39" y2="67" stroke="#1a4a64" stroke-width="0.4"/>
    <line x1="33" y1="43" x2="67" y2="57" stroke="#1a4a64" stroke-width="0.4"/>
    <line x1="33" y1="57" x2="67" y2="43" stroke="#1a4a64" stroke-width="0.4"/>
  </g>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="9" fill="url(#pupilGrad)" clip-path="url(#eyeClip)"/>

  <!-- Highlight -->
  <ellipse cx="44" cy="44" rx="3.5" ry="2.5" fill="white" opacity="0.85"/>

  <!-- Eyelid outline top -->
  <path d="M12 50 Q50 18 88 50" stroke="#1a1730" stroke-width="1.5" fill="none"/>
  <!-- Eyelid outline bottom -->
  <path d="M12 50 Q50 72 88 50" stroke="#1a1730" stroke-width="1" fill="none"/>

  <!-- Vertical center line (the "split" look from the icon) -->
  <line x1="50" y1="26" x2="50" y2="74" stroke="white" stroke-width="0.8" opacity="0.4"/>
</svg>
