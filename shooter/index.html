<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Striker Zero</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
  }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  /* crosshair */
  #xhair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
  }
  .xl {
    position: absolute; background: rgba(255,255,255,0.88);
    border-radius: 1px;
    transition: all 0.07s linear;
    box-shadow: 0 0 4px rgba(255,255,255,0.4);
  }
  #xl { width: 10px; height: 2px; top: -1px; right:  var(--gap, 7px); }
  #xr { width: 10px; height: 2px; top: -1px; left:   var(--gap, 7px); }
  #xu { width: 2px; height: 10px; left: -1px; bottom: var(--gap, 7px); }
  #xd { width: 2px; height: 10px; left: -1px; top:    var(--gap, 7px); }
  .xhit { background: #FF3322 !important; box-shadow: 0 0 6px #FF0000 !important; }

  /* HP */
  #health-wrap {
    position: absolute; bottom: 36px; left: 32px;
  }
  #health-label { color: #aaa; font-size: 11px; letter-spacing: 2px; margin-bottom: 5px; }
  #health-track {
    width: 190px; height: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 1px;
  }
  #health-fill {
    height: 100%; background: #E53935; border-radius: 1px;
    transition: width 0.2s;
    box-shadow: 0 0 8px rgba(229,57,53,0.6);
  }

  /* ammo */
  #ammo-wrap {
    position: absolute; bottom: 28px; right: 32px;
    text-align: right;
  }
  #ammo-label { color: #888; font-size: 11px; letter-spacing: 2px; margin-bottom: 2px; }
  #ammo-display {
    font-size: 36px; font-weight: bold; color: #fff;
    text-shadow: 0 0 12px rgba(255,255,255,0.3);
    font-variant-numeric: tabular-nums; line-height: 1;
  }
  #ammo-display span { font-size: 20px; color: #888; }
  #reload-text {
    color: #FFD700; font-size: 13px; font-weight: bold;
    letter-spacing: 2px; margin-top: 4px;
    opacity: 0; transition: opacity 0.15s;
    text-shadow: 0 0 10px rgba(255,215,0,0.6);
  }

  /* wave/kill info */
  #info {
    position: absolute; top: 20px; right: 24px;
    color: #ccc; font-size: 14px; line-height: 1.8;
    text-shadow: 1px 1px 0 #000; text-align: right;
    letter-spacing: 0.5px;
  }

  #wave-announce {
    position: absolute; top: 37%; left: 50%;
    transform: translate(-50%,-50%);
    color: #FFD700; font-size: 50px; font-weight: bold;
    text-shadow: 0 0 20px rgba(255,200,0,0.8), 2px 2px 0 #000;
    opacity: 0; transition: opacity 0.4s;
    letter-spacing: 4px; pointer-events: none;
  }

  #dmg-flash {
    position: absolute; inset: 0; pointer-events: none;
    background: rgba(255,0,0,0);
    border: 0px solid rgba(255,0,0,0);
    transition: all 0.12s;
  }

  #controls-hint {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font-size: 12px;
    text-shadow: 1px 1px 0 #000; letter-spacing: 0.5px;
    transition: opacity 1.5s;
  }

  /* mobile */
  #mob { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 250px; pointer-events: none; z-index: 20; }
  #jzone { position: absolute; bottom: 28px; left: 28px; width: 145px; height: 145px; pointer-events: all; }
  #jbase { width: 145px; height: 145px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.18); position: relative; }
  #jstick { width: 54px; height: 54px; border-radius: 50%; background: rgba(255,255,255,0.32); border: 2px solid rgba(255,255,255,0.55); position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .mbtn {
    position: absolute; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: #fff; pointer-events: all;
    user-select: none; -webkit-tap-highlight-color: transparent;
    font-size: 12px; letter-spacing: 1px; text-shadow: 1px 1px 0 #000;
    border: 2px solid rgba(255,255,255,0.35);
  }
  #fire-btn { bottom: 42px; right: 32px; width: 96px; height: 96px; background: rgba(200,35,15,0.72); }
  #roll-btn { bottom: 48px; right: 148px; width: 66px; height: 66px; background: rgba(25,70,170,0.72); }

  /* game over */
  #gameover {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.82); z-index: 100;
    align-items: center; justify-content: center; flex-direction: column;
  }
  #gameover h1 {
    font-size: 66px; color: #EF5350; letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(255,0,0,0.7); margin-bottom: 8px;
  }
  #gameover p { font-size: 18px; color: #888; margin-bottom: 40px; letter-spacing: 1px; }
  #restart-btn {
    padding: 14px 56px; font-size: 18px; letter-spacing: 3px;
    background: transparent; color: #fff;
    border: 1px solid rgba(255,255,255,0.4); cursor: pointer;
    transition: all 0.2s; font-weight: bold;
  }
  #restart-btn:hover { background: rgba(255,255,255,0.08); border-color: #fff; }

  /* click-to-play overlay */
  #lock-overlay {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.78);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer;
    color: #fff;
  }
  #lock-overlay h2 {
    font-size: 42px; letter-spacing: 8px; margin-bottom: 14px;
    text-shadow: 0 0 18px rgba(255,255,255,0.4);
  }
  #lock-overlay p {
    font-size: 14px; color: #aaa; letter-spacing: 2px;
    margin-bottom: 6px;
  }
  #lock-overlay .hint { font-size: 12px; color: #777; margin-top: 22px; }

  @media (pointer: coarse) {
    #mob { display: block; }
    #xhair { display: block; }
    #controls-hint { display: none; }
    #lock-overlay { display: none !important; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="vignette"></div>

<div id="hud">
  <div id="xhair">
    <div class="xl" id="xl"></div><div class="xl" id="xr"></div>
    <div class="xl" id="xu"></div><div class="xl" id="xd"></div>
  </div>

  <div id="health-wrap">
    <div id="health-label">HEALTH</div>
    <div id="health-track"><div id="health-fill"></div></div>
  </div>

  <div id="ammo-wrap">
    <div id="ammo-label">AMMO</div>
    <div id="ammo-display"><span id="ac">30</span> <span>/ 30</span></div>
    <div id="reload-text">RELOADING</div>
  </div>

  <div id="info">Wave 0 &nbsp;|&nbsp; Enemies: 0<br>Kills: 0</div>
  <div id="wave-announce"></div>
  <div id="dmg-flash"></div>
  <div id="controls-hint">WASD — Move &nbsp;·&nbsp; Mouse — Aim &nbsp;·&nbsp; Click/Hold — Fire &nbsp;·&nbsp; R — Reload &nbsp;·&nbsp; Shift — Roll &nbsp;·&nbsp; ESC — Release Mouse</div>
</div>

<div id="lock-overlay">
  <h2>STRIKER ZERO</h2>
  <p>CLICK TO PLAY</p>
  <div class="hint">WASD — Move · Mouse — Aim · Click — Fire · R — Reload · Shift — Roll</div>
</div>

<div id="mob">
  <div id="jzone"><div id="jbase"><div id="jstick"></div></div></div>
  <div class="mbtn" id="fire-btn">FIRE</div>
  <div class="mbtn" id="roll-btn">ROLL</div>
</div>

<div id="gameover">
  <h1>GAME OVER</h1>
  <p id="go-score"></p>
  <button id="restart-btn">RESTART</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }        from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }            from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }       from 'three/addons/postprocessing/UnrealBloomPass.js';
import { SSAOPass }              from 'three/addons/postprocessing/SSAOPass.js';
import { BokehPass }             from 'three/addons/postprocessing/BokehPass.js';
import { ShaderPass }            from 'three/addons/postprocessing/ShaderPass.js';
import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';
import { FXAAShader }            from 'three/addons/shaders/FXAAShader.js';
import { Sky }                   from 'three/addons/objects/Sky.js';
import { RoomEnvironment }       from 'three/addons/environments/RoomEnvironment.js';
import { AfterimagePass }        from 'three/addons/postprocessing/AfterimagePass.js';

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const ARENA        = 40;
const PLAYER_SPEED = 6.2;
const ENEMY_SPEED  = 3.4;
const ROLL_DUR     = 0.35;
const ROLL_SPEED   = 15;
const INV_TIME     = 0.9;
const MAX_HP       = 100;
const GUN_DAMAGE   = 34;
const FIRE_RATE    = 0.095; // seconds between shots
const MAG          = 30;
const RELOAD_S     = 1.9;
const TRACER_LIFE  = 0.06;

// ── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type   = THREE.PCFSoftShadowMap;
renderer.toneMapping      = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.62;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

// ── SCENE ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
// Horizon haze colour – matched to sky shader below
scene.fog = new THREE.FogExp2(0x8EB4CC, 0.011);

// ── PHYSICAL SKY (Preetham model) ────────────────────────────────────────────
const sky = new Sky();
sky.scale.setScalar(4500);
scene.add(sky);

const SKY_SUN = new THREE.Vector3();
const SUN_ELEVATION = 32;   // degrees above horizon
const SUN_AZIMUTH   = 165;  // compass degrees
SKY_SUN.setFromSphericalCoords(
  1,
  THREE.MathUtils.degToRad(90 - SUN_ELEVATION),
  THREE.MathUtils.degToRad(SUN_AZIMUTH)
);
const su = sky.material.uniforms;
su['turbidity'].value        = 7.0;
su['rayleigh'].value         = 0.8;
su['mieCoefficient'].value   = 0.004;
su['mieDirectionalG'].value  = 0.80;
su['sunPosition'].value.copy(SKY_SUN);

// ── ENVIRONMENT MAP (metallic reflections on gun, helmets, straps) ────────────
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const rifleEnvMap = pmrem.fromScene(new RoomEnvironment()).texture;
pmrem.dispose();
// Do NOT set scene.environment globally — RoomEnvironment emits bright studio
// white ambient that floods all surfaces and whitewashes the entire scene.

const camera = new THREE.PerspectiveCamera(74, window.innerWidth/window.innerHeight, 0.05, 300);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.6, 0);
scene.add(camera); // children (rifle viewmodel) must be in scene graph

// ── LIGHTING ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xC8D8E8, 0.45));

const dirLight = new THREE.DirectionalLight(0xFFEECC, 1.8);
// Position matches the Sky sun direction so shadows align with the visible sun
dirLight.position.copy(SKY_SUN).multiplyScalar(60);
dirLight.castShadow = true;
dirLight.shadow.mapSize.setScalar(2048);
dirLight.shadow.camera.near   = 1;
dirLight.shadow.camera.far    = 130;
dirLight.shadow.camera.left   = dirLight.shadow.camera.bottom = -60;
dirLight.shadow.camera.right  = dirLight.shadow.camera.top    =  60;
dirLight.shadow.bias = -0.0008;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x5577CC, 0.35);
fillLight.position.set(-18, 12, -22);
scene.add(fillLight);

const muzzleLight = new THREE.PointLight(0xFF9900, 0, 6);
scene.add(muzzleLight);

// ── POST-PROCESSING ──────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

// SSAO — darkens corners and tight spaces for physical depth
const ssaoPass = new SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
ssaoPass.kernelRadius = 10;
ssaoPass.minDistance  = 0.004;
ssaoPass.maxDistance  = 0.14;
ssaoPass.output       = SSAOPass.OUTPUT.Default;
composer.addPass(ssaoPass);

composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.18, 0.25, 0.96
));
// DoF — subtle background blur gives cinematic depth; focus at ~12 units (enemy range)
const bokehPass = new BokehPass(scene, camera, { focus: 12, aperture: 0.00012, maxblur: 0.006 });
composer.addPass(bokehPass);

composer.addPass(new ShaderPass(GammaCorrectionShader));

// ── GOD RAYS — radial blur from sun screen position ──────────────────────────
const GodRaysShader = {
  uniforms: {
    tDiffuse:  { value: null },
    sunPos:    { value: new THREE.Vector2(0.5, 0.5) },
    enabled:   { value: 1.0 },
  },
  vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }',
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 sunPos;
    uniform float enabled;
    varying vec2 vUv;
    const int SAMPLES = 80;
    void main() {
      vec4 base = texture2D(tDiffuse, vUv);
      if (enabled < 0.5) { gl_FragColor = base; return; }
      vec2 ray  = (vUv - sunPos) * (0.88 / float(SAMPLES));
      vec2 coord = vUv;
      float decay = 1.0;
      vec3 rays = vec3(0.0);
      for (int i = 0; i < SAMPLES; i++) {
        coord -= ray;
        vec3 s   = texture2D(tDiffuse, clamp(coord, 0.001, 0.999)).rgb;
        float lum = dot(s, vec3(0.299, 0.587, 0.114));
        rays += s * max(0.0, lum - 0.78) * (1.0/0.22) * decay * 0.4;
        decay *= 0.968;
      }
      gl_FragColor = vec4(base.rgb + rays * 0.14, base.a);
    }`,
};
const godRaysPass = new ShaderPass(GodRaysShader);
composer.addPass(godRaysPass);

// Film grain
const FilmGrainShader = {
  uniforms: { tDiffuse: { value: null }, time: { value: 0 }, intensity: { value: 0.032 } },
  vertexShader:   'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }',
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float time; uniform float intensity;
    varying vec2 vUv;
    float rnd(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453+time); }
    void main(){
      vec4 c = texture2D(tDiffuse, vUv);
      c.rgb += (rnd(vUv)-0.5)*intensity;
      gl_FragColor = c;
    }`,
};
const grainPass = new ShaderPass(FilmGrainShader);
composer.addPass(grainPass);

// ── CHROMATIC ABERRATION — RGB channel split at screen edges ─────────────────
const ChromaticShader = {
  uniforms: { tDiffuse: { value: null }, amount: { value: 0.0028 } },
  vertexShader: 'varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }',
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float amount;
    varying vec2 vUv;
    void main(){
      vec2 dir = normalize(vUv - 0.5);
      float d   = length(vUv - 0.5);
      float ca  = amount * d * d;
      float r = texture2D(tDiffuse, vUv + dir*ca).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - dir*ca).b;
      gl_FragColor = vec4(r, g, b, 1.0);
    }`,
};
composer.addPass(new ShaderPass(ChromaticShader));

// ── MOTION BLUR (AfterimagePass) — blends current frame with decayed previous ─
const afterimagePass = new AfterimagePass(0.0);  // damp driven per-frame
composer.addPass(afterimagePass);

// FXAA
const fxaaPass = new ShaderPass(FXAAShader);
fxaaPass.material.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
composer.addPass(fxaaPass);

// ── MATERIAL FACTORY ─────────────────────────────────────────────────────────
const pbr = (color, roughness = 0.85, metalness = 0) =>
  new THREE.MeshStandardMaterial({ color, roughness, metalness });

// ── PROCEDURAL TEXTURES ───────────────────────────────────────────────────────
function _hash(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}
function _vnoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
  return (_hash(ix,iy)*(1-ux)+_hash(ix+1,iy)*ux)*(1-uy)
       + (_hash(ix,iy+1)*(1-ux)+_hash(ix+1,iy+1)*ux)*uy;
}
function _fbm(x, y, oct=5) {
  let v=0, amp=0.5, f=1;
  for (let i=0; i<oct; i++) { v+=_vnoise(x*f,y*f)*amp; f*=2.07; amp*=0.5; }
  return v;
}
// Domain-warped FBM: warp the lookup coords with another FBM layer → swirling organic look
function _wfbm(x, y) {
  const wx = _fbm(x+0.4, y+9.2, 4);
  const wy = _fbm(x+8.3, y+2.8, 4);
  return _fbm(x + 2.2*wx, y + 2.2*wy, 6);
}
function _tex(size, fn) {
  const cv = document.createElement('canvas'); cv.width = cv.height = size;
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(size, size);
  fn(img.data, size);
  ctx.putImageData(img, 0, 0);
  return cv;
}
function _toTex(cv, repeatX=12, repeatY=12) {
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repeatX, repeatY);
  return t;
}

// GROUND — domain-warped terrain with soil/grass variation
const groundAlbedo = _toTex(_tex(512, (d, sz) => {
  const pal = [
    [25,38,14],[33,50,20],[42,63,26],[52,74,32],[62,83,38],
    [72,90,44],[80,95,50],[64,76,40],[47,57,28],[86,79,50],[70,64,36],
  ];
  for (let y=0; y<sz; y++) for (let x=0; x<sz; x++) {
    const v = Math.max(0,Math.min(1, _wfbm(x/sz*6, y/sz*6) + _fbm(x/sz*12+3,y/sz*12+7,3)*0.14));
    const ci = Math.min(Math.floor(v*(pal.length-1)), pal.length-2);
    const cf = v*(pal.length-1)-ci;
    const p0=pal[ci], p1=pal[ci+1];
    const m = (_hash(x*7.3,y*7.3)-0.5)*11;
    const i=(y*sz+x)*4;
    d[i]  =Math.max(0,Math.min(255,p0[0]+(p1[0]-p0[0])*cf+m));
    d[i+1]=Math.max(0,Math.min(255,p0[1]+(p1[1]-p0[1])*cf+m));
    d[i+2]=Math.max(0,Math.min(255,p0[2]+(p1[2]-p0[2])*cf+m));
    d[i+3]=255;
  }
}), 14, 14);

const groundNormal = _toTex(_tex(256, (d, sz) => {
  const h=(nx,ny)=>_vnoise(nx*6,ny*6)*0.5+_vnoise(nx*14,ny*14)*0.3+_vnoise(nx*28,ny*28)*0.2;
  const e=1/sz;
  for (let y=0; y<sz; y++) for (let x=0; x<sz; x++) {
    const nx=x/sz,ny=y/sz;
    const i=(y*sz+x)*4;
    d[i]  =Math.floor(( -(h(nx+e,ny)-h(nx-e,ny))*6 )*0.5*255+128);
    d[i+1]=Math.floor(( -(h(nx,ny+e)-h(nx,ny-e))*6 )*0.5*255+128);
    d[i+2]=255; d[i+3]=255;
  }
}), 14, 14);

// CONCRETE — cracked stucco for walls
const concreteAlbedo = _toTex(_tex(256, (d, sz) => {
  for (let y=0; y<sz; y++) for (let x=0; x<sz; x++) {
    const n = _fbm(x/sz*5,y/sz*5,5);
    // crack lines: thin dark veins where domain-warped fbm is near 0.5
    const crack = Math.abs(_wfbm(x/sz*4,y/sz*4) - 0.5) < 0.018 ? 0.55 : 1;
    const base = (52 + n*38) * crack;
    const m=(_hash(x*9.1,y*8.3)-0.5)*12;
    const v=Math.max(0,Math.min(255,base+m));
    const i=(y*sz+x)*4;
    d[i]=v+2; d[i+1]=v+1; d[i+2]=v-3; d[i+3]=255;
  }
}), 4, 2);

// WOOD — plank grain for crates
const woodAlbedo = _toTex(_tex(256, (d, sz) => {
  for (let y=0; y<sz; y++) for (let x=0; x<sz; x++) {
    const nx=x/sz, ny=y/sz*3;
    const grain = _vnoise(nx*3,ny*22)*0.35+_vnoise(nx*7,ny*48)*0.15;
    const ring  = Math.sin((ny*4+grain)*Math.PI*10)*0.5+0.5;
    // plank edge lines
    const plank = Math.abs(Math.fract !== undefined
      ? 0 : ((ny*4)%1.0) - 0.5) < 0.04 ? 0.72 : 1;
    const warp = (_fbm(nx*2,ny*2,3)-0.5)*0.12;
    const rng  = ring+warp;
    const m = (_hash(x*5.1,y*5.1)-0.5)*8;
    const i=(y*sz+x)*4;
    d[i]  =Math.max(0,Math.min(255,105+rng*62+m));
    d[i+1]=Math.max(0,Math.min(255, 68+rng*42+m));

}), 3, 3);

    const m = (_hash(x*6.3,y*4.7)-0.5)*10;
    const i=(y*sz+x)*4;
    d[i]  =Math.max(0,Math.min(255,38+v*42+m));
    d[i+1]=Math.max(0,Math.min(255,26+v*28+m));
    d[i+2]=Math.max(0,Math.min(255,12+v*14+m));
    d[i+3]=255;

}), 2, 4);

// ── AUDIO (Web Audio API synthetic sounds) ────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
}
function playShot() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // low thud
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(180, now);
  o.frequency.exponentialRampToValueAtTime(28, now+0.08);
  g.gain.setValueAtTime(0.55, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now+0.14);
  // crack noise
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.07), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.12));
  const s = audioCtx.createBufferSource();
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.45, now);
  s.buffer = buf; s.connect(ng); ng.connect(audioCtx.destination); s.start(now);
}
function playReload() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [now, now+0.22, now+0.52].forEach((t, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(i===2 ? 600 : 350, t);
    o.frequency.exponentialRampToValueAtTime(i===2 ? 1200 : 180, t+0.05);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t+0.08);
  });
}
function playHit() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.04), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.2));
  const s = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.3, now);
  s.buffer = buf; s.connect(g); g.connect(audioCtx.destination); s.start(now);
}
function playDeath() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(300, now);
  o.frequency.exponentialRampToValueAtTime(40, now+0.3);
  g.gain.setValueAtTime(0.4, now);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.35);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now+0.36);
}

// ── PLAYER CLASS ─────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.mesh = buildSoldier(0x2E4060, 0x3A4A3A); // navy + olive helmet
    this.mesh.position.set(0, 0, 0);
    scene.add(this.mesh);

    // viewmodel rifle: attached to camera so it moves/aims with view
    this.rifle = buildRifle();
    this.rifle.rotation.y = Math.PI;          // barrel now points -Z (camera forward)
    this.rifle.position.set(0.32, -0.22, -0.48);
    camera.add(this.rifle);

    // hide body — first person, we don't see ourselves
    this.mesh.visible = false;

    this.hp          = MAX_HP;
    this.ammo        = MAG;
    this.reloading   = false;
    this.reloadTimer = 0;
    this.fireTimer   = 0;
    this.firing      = false;
    this.rolling     = false;
    this.rollTime    = 0;
    this.rollDir     = new THREE.Vector3();
    this.invTime     = 0;
    this.dead        = false;
    this.facingAngle = 0;
    this.walkClock   = 0;
    this.shootClock  = 0;
  }

  get pos() { return this.mesh.position; }

  startFire() { this.firing = true; }
  stopFire()  { this.firing = false; }

  reload() {
    if (this.reloading || this.ammo === MAG || this.dead) return;
    this.reloading = true;
    this.reloadTimer = RELOAD_S;
    playReload();
    document.getElementById('reload-text').style.opacity = '1';
  }

  shoot() {
    if (this.ammo <= 0 || this.reloading || this.dead) {
      if (this.ammo <= 0 && !this.reloading) this.reload();
      return;
    }
    this.ammo--;
    this.fireTimer = FIRE_RATE;
    ensureAudio();
    playShot();

    // muzzle flash
    const flash = this.rifle.getObjectByName('flash');
    if (flash) {
      flash.material.opacity = 0.95;
      setTimeout(() => { if (flash.material) flash.material.opacity = 0; }, 55);
    }
    muzzleLight.intensity = 6;
    // world position of muzzle
    const muzzlePt = this.rifle.getObjectByName('muzzlePoint');
    if (muzzlePt) {
      muzzlePt.getWorldPosition(muzzleLight.position);
    }
    setTimeout(() => muzzleLight.intensity = 0, 60);

    // screen shake
    shakeAmt = 0.055;

    // recoil on rifle mesh
    this.rifle.rotation.x = -0.18;
    setTimeout(() => { if (this.rifle) this.rifle.rotation.x = 0; }, 80);

    // raycast hit
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0, 0), camera);
    const targets = [];
    enemies.forEach(e => { if (!e.dead) e.mesh.traverse(c => { if (c.isMesh) targets.push(c); }); });
    const hits = ray.intersectObjects(targets, false);
    if (hits.length > 0) {
      // find which enemy
      const hitObj = hits[0].object;
      for (const e of enemies) {
        let found = false;
        e.mesh.traverse(c => { if (c === hitObj) found = true; });
        if (found) { e.hit(GUN_DAMAGE, hits[0].point); break; }
      }
      showHitMarker();
    }

    // bullet tracer + env impact when shot misses enemies
    const from = new THREE.Vector3();
    const muzzlePt2 = this.rifle.getObjectByName('muzzlePoint');
    if (muzzlePt2) muzzlePt2.getWorldPosition(from);

    let to;
    if (hits.length > 0) {
      to = hits[0].point;
    } else {
      const envHits = ray.intersectObjects(envMeshes, false);
      if (envHits.length > 0) {
        to = envHits[0].point;
        const n = envHits[0].face ? envHits[0].face.normal.clone()
                                      .applyMatrix3(new THREE.Matrix3().getNormalMatrix(envHits[0].object.matrixWorld))
                                      .normalize()
                                  : new THREE.Vector3(0,1,0);
        spawnImpact(to, n);
      } else {
        to = ray.ray.at(50, new THREE.Vector3());
      }
    }
    spawnTracer(from, to);

    updateAmmoHUD();
  }

  roll(dir) {
    if (this.rolling || this.dead || dir.lengthSq() < 0.01) return;
    this.rolling  = true;
    this.rollTime = ROLL_DUR;
    this.rollDir.copy(dir).normalize();
    this.invTime  = ROLL_DUR + 0.2;
  }

  takeDamage(n) {
    if (this.invTime > 0 || this.dead) return;
    this.hp = Math.max(0, this.hp - n);
    this.invTime = INV_TIME;
    shakeAmt = 0.1;
    updateHealthHUD();
    flashDamage();
    if (this.hp <= 0) { this.dead = true; showGameOver(); }
  }

  update(dt, dir) {
    if (this.dead) return;

    if (this.reloading) {
      this.reloadTimer -= dt;
      if (this.reloadTimer <= 0) {
        this.reloading = false;
        this.ammo = MAG;
        document.getElementById('reload-text').style.opacity = '0';
        updateAmmoHUD();
      }
    }

    if (this.fireTimer > 0) this.fireTimer -= dt;
    if (this.firing && this.fireTimer <= 0 && !this.reloading) this.shoot();

    if (this.invTime > 0) {
      this.invTime -= dt;
      this.mesh.visible = (Math.floor(this.invTime * 9) % 2 === 0);
    } else {
      this.mesh.visible = true;
    }

    let md = dir.clone(), speed = PLAYER_SPEED;
    if (this.rolling) {
      this.rollTime -= dt;
      md = this.rollDir.clone(); speed = ROLL_SPEED;
      if (this.rollTime <= 0) this.rolling = false;
    }

    this.pos.addScaledVector(md, speed * dt);
    this.pos.x = Math.max(-ARENA+0.6, Math.min(ARENA-0.6, this.pos.x));
    this.pos.z = Math.max(-ARENA+0.6, Math.min(ARENA-0.6, this.pos.z));

    if (md.lengthSq() > 0.01) {
      const ta = Math.atan2(md.x, md.z);
      const d  = ((ta - this.facingAngle + Math.PI) % (Math.PI * 2)) - Math.PI;
      this.facingAngle += d * 0.16;
      this.mesh.rotation.y = this.facingAngle;
      this.walkClock += dt * 9;
      const lL = this.mesh.getObjectByName('lLeg');
      const rL = this.mesh.getObjectByName('rLeg');
      if (lL) lL.rotation.x =  Math.sin(this.walkClock) * 0.42;
      if (rL) rL.rotation.x = -Math.sin(this.walkClock) * 0.42;
    } else {
      const lL = this.mesh.getObjectByName('lLeg');
      const rL = this.mesh.getObjectByName('rLeg');
      if (lL) lL.rotation.x *= 0.8;
      if (rL) rL.rotation.x *= 0.8;
    }

    // viewmodel bob while walking
    if (md.lengthSq() > 0.01) {
      this.shootClock += dt * 9;
      this.rifle.position.y = -0.22 + Math.sin(this.shootClock) * 0.012;
      this.rifle.position.x =  0.32 + Math.sin(this.shootClock * 0.5) * 0.008;
    } else {
      this.rifle.position.y += (-0.22 - this.rifle.position.y) * 0.15;
      this.rifle.position.x += ( 0.32 - this.rifle.position.x) * 0.15;
    }
  }
}

// ── ENEMY CLASS ──────────────────────────────────────────────────────────────
let enemies = [];
let wave = 0, kills = 0;

class Enemy {
  constructor(x, z) {
    this.mesh = buildSoldier(0x5A3A20, 0x6B1A1A); // tan + red helmet
    this.mesh.position.set(x, 0, z);
    scene.add(this.mesh);

    this.maxHp  = 60 + wave * 15;
    this.hp     = this.maxHp;
    this.dead   = false;
    this.state  = 'patrol';
    this.patrol = new THREE.Vector3((Math.random()-0.5)*ARENA*1.7, 0, (Math.random()-0.5)*ARENA*1.7);
    this.atkCd  = 1.0 + Math.random();
    this.wClock = Math.random()*10;
    this.kb     = new THREE.Vector3();

    // HP bar
    this._cvs = document.createElement('canvas');
    this._cvs.width = 64; this._cvs.height = 10;
    this._tex = new THREE.CanvasTexture(this._cvs);
    const bar = new THREE.Mesh(
      new THREE.PlaneGeometry(1.1, 0.18),
      new THREE.MeshBasicMaterial({ map: this._tex, transparent: true, depthWrite: false })
    );
    bar.position.y = 2.1; bar.renderOrder = 1; bar.name = 'hpbar';
    this.mesh.add(bar);
    this._drawBar();
  }

  _drawBar() {
    const ctx = this._cvs.getContext('2d');
    ctx.clearRect(0, 0, 64, 10);
    ctx.fillStyle = '#111'; ctx.fillRect(0, 2, 64, 6);
    const pct = this.hp / this.maxHp;
    ctx.fillStyle = pct > 0.5 ? '#2ecc40' : pct > 0.25 ? '#ff9900' : '#e53935';
    ctx.fillRect(0, 2, Math.round(pct * 64), 6);
    this._tex.needsUpdate = true;
  }

  hit(dmg, point) {
    if (this.dead) return;
    this.hp -= dmg;
    this._drawBar();
    playHit();
    const dir = this.mesh.position.clone().sub(player.pos).normalize();
    this.kb.copy(dir).multiplyScalar(5.5);
    // flash white
    this.mesh.traverse(c => {
      if (!c.isMesh || !c.material || !c.material.emissive) return;
      c.material.emissive.setHex(0xFFFFFF);
      c.material.emissiveIntensity = 0.7;
      setTimeout(() => { if (c.material) { c.material.emissive.setHex(0); c.material.emissiveIntensity = 0; } }, 100);
    });
    spawnBlood(point || this.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)));
    if (this.hp <= 0) this._die();
  }

  _die() {
    this.dead = true;
    kills++;
    playDeath();
    spawnBlood(this.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 16);
    let t = 0;
    const fall = () => {
      t += 0.055;
      this.mesh.rotation.x = Math.min(t * 2.2, Math.PI / 2);
      this.mesh.position.y = Math.max(-0.2, -t * 0.35);
      if (t < 1.4) requestAnimationFrame(fall);
      else scene.remove(this.mesh);
    };
    fall();
    updateInfo();
    checkWaveEnd();
  }

  update(dt) {
    if (this.dead) return;
    if (this.kb.lengthSq() > 0.01) {
      this.mesh.position.addScaledVector(this.kb, dt);
      this.kb.multiplyScalar(0.8);
    }
    const toP = player.pos.clone().sub(this.mesh.position);
    const dist = toP.length();
    if (dist < 18) this.state = 'chase';
    else if (dist > 24) this.state = 'patrol';

    let dir = new THREE.Vector3();
    if (this.state === 'chase') {
      if (dist > 1.65) dir.copy(toP).normalize();
      this.atkCd -= dt;
      if (this.atkCd <= 0 && dist < 2.1) {
        this.atkCd = 1.3 + Math.random() * 0.5;
        player.takeDamage(12);
      }
    } else {
      const d = this.patrol.clone().sub(this.mesh.position);
      if (d.length() < 1.5) this.patrol.set((Math.random()-0.5)*ARENA*1.7, 0, (Math.random()-0.5)*ARENA*1.7);
      else dir.copy(d).normalize();
    }

    this.mesh.position.addScaledVector(dir, ENEMY_SPEED * dt);
    this.mesh.position.x = Math.max(-ARENA+0.6, Math.min(ARENA-0.6, this.mesh.position.x));
    this.mesh.position.z = Math.max(-ARENA+0.6, Math.min(ARENA-0.6, this.mesh.position.z));
    if (dir.lengthSq() > 0.01) {
      this.mesh.rotation.y = Math.atan2(dir.x, dir.z);
      this.wClock += dt * 7.5;
      const lL = this.mesh.getObjectByName('lLeg');
      const rL = this.mesh.getObjectByName('rLeg');
      if (lL) lL.rotation.x =  Math.sin(this.wClock) * 0.44;
      if (rL) rL.rotation.x = -Math.sin(this.wClock) * 0.44;
    }
    const bar = this.mesh.getObjectByName('hpbar');
    if (bar) bar.lookAt(camera.position.clone().sub(this.mesh.position).add(this.mesh.position));
  }
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
const particles = [];
function spawnBlood(pos, count = 8) {
  const cols = [0xCC2200, 0xAA1100, 0xFF3300, 0x880000];
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.055 + Math.random()*0.06, 4, 3),
      new THREE.MeshBasicMaterial({ color: cols[i % cols.length] })
    );
    m.position.copy(pos);
    scene.add(m);
    particles.push({
      mesh: m,
      vel:  new THREE.Vector3((Math.random()-0.5)*6, 2+Math.random()*4, (Math.random()-0.5)*6),
      life: 0.5, max: 0.5
    });
  }
}
function spawnImpact(pos, normal) {
  // bright sparks
  for (let i = 0; i < 7; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.028 + Math.random()*0.022, 3, 2),
      new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xFFBB22 : 0xFF8800 })
    );
    m.position.copy(pos);
    const vel = new THREE.Vector3(
      normal.x * (0.5 + Math.random()*1.5) + (Math.random()-0.5)*2.5,
      normal.y * (0.5 + Math.random()*1.5) + 0.5 + Math.random()*2,
      normal.z * (0.5 + Math.random()*1.5) + (Math.random()-0.5)*2.5
    );
    scene.add(m);
    particles.push({ mesh:m, vel, life:0.28, max:0.28, smoke:false });
  }
  // smoke puff — expands and fades
  const sm = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 4),
    new THREE.MeshBasicMaterial({ color:0x999999, transparent:true, opacity:0.55, depthWrite:false })
  );
  sm.position.copy(pos).addScaledVector(normal, 0.05);
  scene.add(sm);
  particles.push({ mesh:sm, vel: new THREE.Vector3(0,0.4,0).addScaledVector(normal,0.3),
                   life:0.7, max:0.7, smoke:true, opacity:0.55 });
}

function tickParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vel.y -= 9 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.smoke) {
      const t = 1 - p.life/p.max;
      p.mesh.scale.setScalar(1 + t * 4);
      p.mesh.material.opacity = (p.life/p.max) * p.opacity;
    } else {
      p.mesh.scale.setScalar(Math.max(0.01, p.life/p.max));
    }
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }
}

// ── BULLET TRACERS ────────────────────────────────────────────────────────────
const tracers = [];
function spawnTracer(from, to) {
  const pts = [from.clone(), to.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0xFFFF88, transparent: true, opacity: 0.85 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  tracers.push({ line, life: TRACER_LIFE, max: TRACER_LIFE });
}
function tickTracers(dt) {
  for (let i = tracers.length-1; i >= 0; i--) {
    const t = tracers[i];
    t.life -= dt;
    t.line.material.opacity = (t.life / t.max) * 0.85;
    if (t.life <= 0) { scene.remove(t.line); tracers.splice(i, 1); }
  }
}

// ── WAVE SYSTEM ──────────────────────────────────────────────────────────────
function nextWave() {
  wave++;
  const count = 4 + wave * 2;
  const el = document.getElementById('wave-announce');
  el.textContent = `WAVE ${wave}`; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2200);
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, r = ARENA-4-Math.random()*7;
    enemies.push(new Enemy(Math.cos(a)*r, Math.sin(a)*r));
  }
  updateInfo();
}
function checkWaveEnd() {
  if (enemies.every(e => e.dead)) setTimeout(nextWave, 3000);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHealthHUD() {
  document.getElementById('health-fill').style.width = (player.hp / MAX_HP * 100) + '%';
  const hue = player.hp > 50 ? 4 : player.hp > 25 ? 30 : 4;
  document.getElementById('health-fill').style.background =
    player.hp > 50 ? '#E53935' : player.hp > 25 ? '#FF9800' : '#FF1744';
}
function updateAmmoHUD() {
  document.getElementById('ac').textContent = player.ammo;
}
function updateInfo() {
  const alive = enemies.filter(e => !e.dead).length;
  document.getElementById('info').innerHTML =
    `Wave ${wave} &nbsp;|&nbsp; Enemies: ${alive}<br>Kills: ${kills}`;
}
function flashDamage() {
  const el = document.getElementById('dmg-flash');
  el.style.background    = 'rgba(255,0,0,0.32)';
  el.style.border        = '8px solid rgba(255,0,0,0.5)';
  setTimeout(() => { el.style.background='rgba(255,0,0,0)'; el.style.border='0px solid rgba(255,0,0,0)'; }, 180);
}
function showHitMarker() {
  document.querySelectorAll('.xl').forEach(e => e.classList.add('xhit'));
  setTimeout(() => document.querySelectorAll('.xl').forEach(e => e.classList.remove('xhit')), 120);
}
function showGameOver() {
  document.getElementById('go-score').textContent = `Wave ${wave}  ·  ${kills} kills`;
  document.getElementById('gameover').style.display = 'flex';
}
document.getElementById('restart-btn').addEventListener('click', () => location.reload());

// crosshair spread based on movement
function updateCrosshair(moving) {
  const gap = moving ? '12px' : '7px';
  document.querySelectorAll('.xl').forEach(el => el.style.setProperty('--gap', gap));
}

setTimeout(() => { document.getElementById('controls-hint').style.opacity = '0'; }, 5500);

// ── CAMERA (FPS) ──────────────────────────────────────────────────────────────
let camYaw = 0, camPitch = 0;
const PITCH_MAX = Math.PI / 2 - 0.02;
let shakeAmt = 0;
const EYE_HEIGHT = 1.55;

function tickCamera(dt) {
  camera.position.set(player.pos.x, player.pos.y + EYE_HEIGHT, player.pos.z);

  if (shakeAmt > 0) {
    camera.position.x += (Math.random()-0.5)*shakeAmt;
    camera.position.y += (Math.random()-0.5)*shakeAmt*0.5;
    camera.position.z += (Math.random()-0.5)*shakeAmt*0.5;
    shakeAmt = Math.max(0, shakeAmt - dt*7);
  }

  camera.rotation.y = camYaw;
  camera.rotation.x = camPitch;
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
    const d = buildDir(); player.roll(d);
  }
  if (e.code === 'KeyR') player.reload();
});
document.addEventListener('keyup', e => keys[e.code] = false);

// Pointer lock for FPS mouse-look
const canvasEl = document.getElementById('canvas');
const lockOverlay = document.getElementById('lock-overlay');
const MOUSE_SENS = 0.0022;

lockOverlay.addEventListener('click', () => {
  ensureAudio();
  canvasEl.requestPointerLock?.();
});
canvasEl.addEventListener('click', () => {
  if (document.pointerLockElement !== canvasEl) canvasEl.requestPointerLock?.();
});

document.addEventListener('pointerlockchange', () => {
  const locked = document.pointerLockElement === canvasEl;
  lockOverlay.style.display = locked ? 'none' : 'flex';
  if (!locked) player.stopFire();
});

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement !== canvasEl) return;
  camYaw   -= e.movementX * MOUSE_SENS;
  camPitch -= e.movementY * MOUSE_SENS;
  camPitch = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, camPitch));
});

document.addEventListener('mousedown', e => {
  if (document.pointerLockElement !== canvasEl) return;
  if (e.button === 0) player.startFire();
});
document.addEventListener('mouseup', e => {
  if (e.button === 0) player.stopFire();
});
document.addEventListener('contextmenu', e => e.preventDefault());

const joyDir = new THREE.Vector2();
function buildDir() {
  const fwd   = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const right = new THREE.Vector3( Math.cos(camYaw), 0, -Math.sin(camYaw));
  const d = new THREE.Vector3();
  if (keys['KeyW']||keys['ArrowUp'])    d.addScaledVector(fwd,    1);
  if (keys['KeyS']||keys['ArrowDown'])  d.addScaledVector(fwd,   -1);
  if (keys['KeyA']||keys['ArrowLeft'])  d.addScaledVector(right, -1);
  if (keys['KeyD']||keys['ArrowRight']) d.addScaledVector(right,  1);
  if (joyDir.lengthSq() > 0.01) {
    d.addScaledVector(fwd,   joyDir.y);
    d.addScaledVector(right, joyDir.x);
  }
  if (d.lengthSq() > 1) d.normalize();
  return d;
}

// ── MOBILE ────────────────────────────────────────────────────────────────────
const jbase = document.getElementById('jbase');
const jstick = document.getElementById('jstick');
const jzone  = document.getElementById('jzone');
let jtid = null, jorg = {x:0,y:0};
const JMAX = 46;

jzone.addEventListener('touchstart', e => {
  e.preventDefault(); ensureAudio();
  const t = e.changedTouches[0]; jtid = t.identifier;
  const r = jbase.getBoundingClientRect();
  jorg = { x: r.left+r.width/2, y: r.top+r.height/2 };
}, {passive:false});
jzone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== jtid) continue;
    const dx=t.clientX-jorg.x, dy=t.clientY-jorg.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    const cx=len>JMAX ? dx/len*JMAX : dx, cy=len>JMAX ? dy/len*JMAX : dy;
    jstick.style.transform=`translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
    joyDir.set(cx/JMAX, -cy/JMAX);
  }
}, {passive:false});
jzone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier!==jtid) continue;
    jtid=null; jstick.style.transform='translate(-50%,-50%)'; joyDir.set(0,0);
  }
});
// camera touch (right half) — FPS look
// Also claimed by the fire button so hold-and-drag fires + aims simultaneously
let ctid=null, ctlast={x:0,y:0};

document.getElementById('fire-btn').addEventListener('touchstart', e => {
  e.preventDefault(); ensureAudio(); player.startFire();
  // claim the look-camera slot so dragging this touch aims
  const t = e.changedTouches[0];
  ctid = t.identifier; ctlast = {x:t.clientX, y:t.clientY};
}, {passive:false});
document.getElementById('fire-btn').addEventListener('touchend', e => {
  e.preventDefault(); player.stopFire();
  for (const t of e.changedTouches) if (t.identifier===ctid) ctid=null;
}, {passive:false});

document.getElementById('roll-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  const d = buildDir();
  if (d.lengthSq()>0.01) player.roll(d);
  else player.roll(new THREE.Vector3(-Math.sin(camYaw),0,-Math.cos(camYaw)));
}, {passive:false});

document.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) {
    if (t.clientX > window.innerWidth*0.5 && ctid===null) {
      const tgt=t.target;
      if (tgt.id!=='fire-btn'&&tgt.id!=='roll-btn') {
        ctid=t.identifier; ctlast={x:t.clientX,y:t.clientY};
      }
    }
  }
}, {passive:true});
document.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier!==ctid) continue;
    camYaw   -= (t.clientX-ctlast.x)*0.006;
    camPitch -= (t.clientY-ctlast.y)*0.006;
    camPitch = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, camPitch));
    ctlast={x:t.clientX,y:t.clientY};
  }
}, {passive:true});
document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) if (t.identifier===ctid) ctid=null;
});

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  ssaoPass.setSize(w, h);
  bokehPass.uniforms['aspect'].value = w / h;
  fxaaPass.material.uniforms['resolution'].value.set(1/w, 1/h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
const player = new Player();
// Apply env map reflections to the rifle viewmodel only
player.rifle.traverse(c => {
  if (c.isMesh && c.material.metalness > 0.3) {
    c.material.envMap = rifleEnvMap;
    c.material.envMapIntensity = 1.2;
    c.material.needsUpdate = true;
  }
});
updateHealthHUD(); updateAmmoHUD(); updateInfo();
nextWave();

// ── GOD RAYS — project sun to screen each frame ───────────────────────────────
const _sunProj = new THREE.Vector3();
function updateGodRays() {
  _sunProj.copy(SKY_SUN).multiplyScalar(200).add(camera.position);
  _sunProj.project(camera);
  const inFront = _sunProj.z <= 1.0;
  godRaysPass.material.uniforms.sunPos.value.set(
    (_sunProj.x + 1) * 0.5,
    (_sunProj.y + 1) * 0.5
  );
  godRaysPass.material.uniforms.enabled.value = inFront ? 1.0 : 0.0;
}

let last = performance.now();
let prevYaw = 0, prevPitch = 0;

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now-last)/1000, 0.05);
  last = now;

  if (!player.dead) {
    const dir = buildDir();
    updateCrosshair(dir.lengthSq() > 0.01);
    player.update(dt, dir);
    enemies.forEach(e => e.update(dt));
    tickParticles(dt);
    tickTracers(dt);
  }

  // Motion blur — damping scales with camera rotation speed
  const rotSpeed = (Math.abs(camYaw - prevYaw) + Math.abs(camPitch - prevPitch)) / dt;
  afterimagePass.uniforms['damp'].value = Math.min(0.88, rotSpeed * 0.012);
  prevYaw = camYaw; prevPitch = camPitch;

  grainPass.material.uniforms.time.value += dt;
  updateGodRays();
  tickCamera(dt);
  composer.render();
}
requestAnimationFrame(loop);
</script>
